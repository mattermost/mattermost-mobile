name: Detox iOS E2E Tests Template

on:
  workflow_call:
    secrets:
      MM_MOBILE_E2E_ADMIN_EMAIL:
        required: false
      MM_MOBILE_E2E_ADMIN_USERNAME:
        required: false
      MM_MOBILE_E2E_ADMIN_PASSWORD:
        required: false
      MM_MOBILE_E2E_ZEPHYR_API_KEY:
        required: false
      MM_MOBILE_E2E_TEST_CYCLE_LINK_PREFIX:
        required: false
      MM_MOBILE_E2E_WEBHOOK_URL:
        required: false
      MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID:
        required: false
      MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY:
        required: false
    inputs:
      MM_TEST_SERVER_URL:
        description: "The test server URL (SITE_1)"
        required: false
        type: string
      MM_TEST_SERVER_URL_2:
        description: "The second test server URL (SITE_2); optional, no automatic fallback"
        required: false
        type: string
      MM_TEST_SERVER_URL_3:
        description: "The third test server URL (SITE_3); optional, no automatic fallback"
        required: false
        type: string
      MM_TEST_USER_NAME:
        description: "The admin username of the test instance"
        required: false
        type: string
      MM_TEST_PASSWORD:
        description: "The admin password of the test instance"
        required: false
        type: string
      MOBILE_VERSION:
        description: "The mobile version to test"
        required: false
        default: ""
        type: string
      run-type:
        type: string
        required: false
        default: "PR"
      testcase_failure_fatal:
        description: "Should failures be considered fatal"
        required: false
        type: boolean
        default: false
      record_tests_in_zephyr:
        description: "Record test results in Zephyr, typically for nightly and release runs"
        required: false
        type: boolean
        default: false
      ios_device_name:
        description: "iPhone simulator name"
        required: false
        type: string
        default: "iPhone 17 Pro"
      ios_device_os_name:
        description: "iPhone simulator OS version"
        required: false
        type: string
        default: "iOS 26.2"
      low_bandwidth_mode:
        description: "Enable low bandwidth mode"
        required: false
        type: boolean
        default: false
      search_path:
        description: "Path to search for test specs (use for smoke test subset)"
        required: false
        type: string
        default: "detox/e2e/test"
      parallelism:
        description: "Number of parallel test shards"
        required: false
        type: string
        default: "20"
      detox_config:
        description: "Detox configuration name to use (e.g. ios.sim.debug, ios.ipad.debug)"
        required: false
        type: string
        default: "ios.sim.debug"
      artifact_run_id:
        description: "Run ID of the workflow that uploaded ios-build-simulator-* (defaults to caller run)"
        required: false
        type: string
        default: ""
    outputs:
      STATUS:
        value: ${{ jobs.generate-report.outputs.STATUS }}
      TARGET_URL:
        value: ${{ jobs.generate-report.outputs.TARGET_URL }}
      FAILURES:
        value: ${{ jobs.generate-report.outputs.FAILURES }}
      PASSES:
        value: ${{ jobs.generate-report.outputs.PASSES }}
      TOTAL:
        value: ${{ jobs.generate-report.outputs.TOTAL }}
      SKIPPED:
        value: ${{ jobs.generate-report.outputs.SKIPPED }}
      ERRORS:
        value: ${{ jobs.generate-report.outputs.ERRORS }}
      PERCENTAGE:
        value: ${{ jobs.generate-report.outputs.PERCENTAGE }}

env:
  AWS_REGION: "us-east-1"
  ADMIN_EMAIL: ${{ secrets.MM_MOBILE_E2E_ADMIN_EMAIL }}
  ADMIN_USERNAME: ${{ inputs.MM_TEST_USER_NAME || secrets.MM_MOBILE_E2E_ADMIN_USERNAME }}
  ADMIN_PASSWORD: ${{ inputs.MM_TEST_PASSWORD || secrets.MM_MOBILE_E2E_ADMIN_PASSWORD }}
  BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  COMMIT_HASH: ${{ github.sha }}
  DEVICE_NAME: ${{ inputs.ios_device_name }}
  DEVICE_OS_VERSION: ${{ inputs.ios_device_os_name }}
  DETOX_AWS_S3_BUCKET: "mattermost-detox-report"
  HEADLESS: "true"
  TYPE: ${{ inputs.run-type }}
  PULL_REQUEST: "https://github.com/mattermost/mattermost-mobile/pull/${{ github.event.number }}"
  SITE_1_URL: ${{ inputs.MM_TEST_SERVER_URL }}
  SITE_2_URL: ${{ inputs.MM_TEST_SERVER_URL_2 }}
  SITE_3_URL: ${{ inputs.MM_TEST_SERVER_URL_3 }}
  ZEPHYR_ENABLE: ${{ inputs.record_tests_in_zephyr }}
  JIRA_PROJECT_KEY: "MM"
  ZEPHYR_API_KEY: ${{ secrets.MM_MOBILE_E2E_ZEPHYR_API_KEY }}
  ZEPHYR_FOLDER_ID: "3233873"
  TEST_CYCLE_LINK_PREFIX: ${{ secrets.MM_MOBILE_E2E_TEST_CYCLE_LINK_PREFIX }}
  WEBHOOK_URL: ${{ secrets.MM_MOBILE_E2E_WEBHOOK_URL }}
  FAILURE_MESSAGE: "Something has failed"
  IOS: "true"
  RUNNING_E2E: "true"
  ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id || github.run_id }}

jobs:
  generate-specs:
    runs-on: ubuntu-24.04
    outputs:
      specs: ${{ steps.generate-specs.outputs.specs }}
      build_id: ${{ steps.resolve-device.outputs.BUILD_ID }}
      mobile_sha: ${{ steps.resolve-device.outputs.MOBILE_SHA }}
      mobile_ref: ${{ steps.resolve-device.outputs.MOBILE_REF }}
      workflow_hash: ${{ steps.resolve-device.outputs.WORKFLOW_HASH }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Set Build ID
        id: resolve-device

        run: |
          BUILD_ID="${{ github.run_id }}-${{ env.DEVICE_NAME }}-${{ env.DEVICE_OS_VERSION}}"
          WORKFLOW_HASH=$(tr -dc a-z0-9 </dev/urandom | head -c 10)

          ## We need that hash to separate the artifacts
          echo "WORKFLOW_HASH=${WORKFLOW_HASH}" >> ${GITHUB_OUTPUT}

          echo "BUILD_ID=$(echo ${BUILD_ID} | sed 's/ /_/g')" >> ${GITHUB_OUTPUT}
          echo "MOBILE_SHA=$(git rev-parse HEAD)" >> ${GITHUB_OUTPUT}
          echo "MOBILE_REF=$(git rev-parse --abbrev-ref HEAD)" >> ${GITHUB_OUTPUT}

      - name: Generate Test Specs
        id: generate-specs
        uses: ./.github/actions/generate-specs
        with:
          parallelism: ${{ inputs.parallelism }}
          search_path: ${{ inputs.search_path }}
          device_name: ${{ env.DEVICE_NAME }}
          device_os_version: ${{ env.DEVICE_OS_VERSION }}

  e2e-ios:
    name: machine-${{ matrix.runId }}-os-${{ matrix.deviceOsVersion }}
    # Temporarily reverted to macos-15 due to Metro stabilization issues on macos-26.
    # macos-26 ships the iOS 26.2 runtime pre-installed, avoiding a ~10min
    # LaunchServicesMigrator + runtime install on every shard, but has timing issues.
    # TODO: Investigate macos-26 Metro/Detox compatibility and re-enable if resolved.
    runs-on: macos-15
    continue-on-error: true
    timeout-minutes: ${{ inputs.low_bandwidth_mode && 240 || 180 }}
    env:
      IOS: true
    needs:
      - generate-specs
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-specs.outputs.specs) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: ci/prepare-node-deps
        uses: ./.github/actions/prepare-node-deps

      # ── Pillar 3: Cache simulator setup ───────────────────────────────────────
      # Cache Homebrew packages including applesimutils
      - name: Cache Homebrew packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/applesimutils
          key: ${{ runner.os }}-${{ runner.arch }}-brew-applesimutils-v1
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-brew-applesimutils-

      - name: Install Homebrew Dependencies
        run: |
          brew tap wix/brew
          # Homebrew 5.2+/6.0 requires explicit trust before loading third-party formulae.
          brew trust wix/brew
          brew install applesimutils
          # Cache restores Cellar without /opt/homebrew/bin symlinks — link the tap formula explicitly.
          brew link --overwrite --force wix/brew/applesimutils 2>/dev/null \
            || brew link --overwrite applesimutils

      - name: Download iOS Simulator Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ios-build-simulator-${{ env.ARTIFACT_RUN_ID }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          github-token: ${{ github.token }}
          path: mobile-artifacts

      - name: Unzip iOS Simulator Build
        run: |
          unzip -o mobile-artifacts/*.zip -d mobile-artifacts/
          # delete zip file
          rm -f mobile-artifacts/*.zip

      - name: Prepare Low Bandwidth Environment
        id: prepare-low-bandwidth
        uses: ./.github/actions/prepare-low-bandwidth
        if: ${{ inputs.low_bandwidth_mode }}
        with:
          test_server_url: ${{ env.SITE_1_URL }}
          device_name: ${{ env.DEVICE_NAME }}
          # all these value should be configurable
          download_speed: "3300"
          upload_speed: "3300"
          latency: "500"

      - name: Cache detox node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: detox/node_modules
          key: ${{ runner.os }}-detox-deps-${{ hashFiles('detox/package-lock.json') }}
          restore-keys: ${{ runner.os }}-detox-deps-

      - name: Install Detox Dependencies
        run: cd detox && npm i

      - name: Get Xcode Version
        id: xcode-version
        run: echo "version=$(xcodebuild -version | head -1 | sed 's/Xcode //')" >> "$GITHUB_OUTPUT"

      - name: Cache Detox Framework
        id: detox-framework-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Detox/ios
          key: ${{ runner.os }}-${{ runner.arch }}-detox-framework-${{ hashFiles('detox/package-lock.json') }}-xcode-${{ steps.xcode-version.outputs.version }}

      - name: Build Detox Framework Cache
        if: steps.detox-framework-cache.outputs.cache-hit != 'true'
        run: cd detox && npx detox build-framework-cache

      # ── Use preboot_ios_simulator.sh (Pillar 3) ─────────────────────────────────
      # Replaces ~150 lines of inline boot logic. The script already skips autofill
      # re-config when the marker exists, does a single boot on warm sims, and
      # optionally skips pre-warm (PREBOOT_SKIP_PREWARM=1 — Maestro pattern).
      # Not caching full CoreSimulator/Devices dir — it's multi-GB, mutates on every
      # boot, and would evict other caches within the 10GB GHA limit.
      - name: Pre-boot iOS Simulator
        run: |
          export DEVICE_NAME="${{ env.DEVICE_NAME }}"
          export DEVICE_OS_VERSION="${{ env.DEVICE_OS_VERSION }}"
          export PREBOOT_SKIP_PREWARM=1
          bash detox/scripts/preboot_ios_simulator.sh

      - name: Start Proxy
        if: ${{ inputs.low_bandwidth_mode }}
        id: start-proxy
        uses: ./.github/actions/start-proxy
        with:
          test_server_url: ${{ env.SITE_1_URL }}

      - name: Set .env with RUNNING_E2E=true
        run: |
          echo "RUNNING_E2E=true" > .env

      - name: Verify Simulator Health
        run: |
          echo "Verifying simulator health before running tests..."

          # Check if simulator is still responsive
          if ! xcrun simctl bootstatus "$SIMULATOR_ID" -b 2>/dev/null; then
            echo "⚠️ Simulator not responsive, attempting recovery..."

            # Try to shutdown and reboot
            xcrun simctl shutdown "$SIMULATOR_ID" || true
            sleep 3
            xcrun simctl boot "$SIMULATOR_ID"
            xcrun simctl bootstatus "$SIMULATOR_ID"

            # Re-open Simulator.app after reboot
            open -a Simulator --args -CurrentDeviceUDID "$SIMULATOR_ID"
            sleep 5
          fi

          # Verify the app is still installed (simctl install can silently fail)
          if ! xcrun simctl get_app_container "$SIMULATOR_ID" com.mattermost.rnbeta 2>/dev/null; then
            echo "⚠️ App not found in simulator — reinstalling..."
            APP_PATH=$(ls -d mobile-artifacts/*.app 2>/dev/null | head -1)
            if [ -n "$APP_PATH" ]; then
              xcrun simctl install "$SIMULATOR_ID" "$APP_PATH"
              echo "✅ App reinstalled"
            else
              echo "❌ No .app bundle found for reinstall"
              exit 1
            fi
          fi

          # Reduce CPU competition: disable Spotlight indexing and other macOS services
          # that consume CPU on CI runners (3-core M1 with 7 GB RAM)
          sudo mdutil -a -i off 2>/dev/null || true

          echo "✅ Simulator is healthy and ready"

      - name: Start Metro Bundler and Run Detox E2E Tests
        # Bumped from 60 to 180 min: with ~6 specs per shard averaging 5-15 min each,
        # the 60min step timeout was being hit silently — GitHub kills the step but
        # `continue-on-error: true` masks it, and the tests that didn't run get
        # dropped from the result count. iOS run 26368981355 had 524 tests vs
        # Android's 537 (same codebase, same 124 spec files) — the 13-test gap was
        # tail tests on shards that timed out at this step. 180 matches the job
        # timeout above so the step uses the full available budget.
        timeout-minutes: 180
        continue-on-error: true # We want to run all the tests
        run: |
          # Start Metro bundler in background
          npm run start > metro.log 2>&1 &
          METRO_PID=$!
          echo "Metro PID: $METRO_PID"
          echo "METRO_PID=$METRO_PID" >> $GITHUB_ENV

          # Wait for Metro to be ready with health check endpoint polling
          timeout=120
          elapsed=0
          echo "Waiting for Metro bundler to be ready..."
          while [ $elapsed -lt $timeout ]; do
            # Try health check endpoint first (more reliable)
            if curl -s http://localhost:8081/status 2>/dev/null | grep -q "packager-status:running"; then
              echo "✅ Metro bundler is ready after ${elapsed}s (verified via health check)"
              break
            # Fallback to log checking
            elif grep -q "Fast - Scalable - Integrated" metro.log 2>/dev/null; then
              echo "✅ Metro bundler is ready after ${elapsed}s (verified via logs)"
              break
            fi

            # Show progress every 10 seconds
            if [ $((elapsed % 10)) -eq 0 ] && [ $elapsed -gt 0 ]; then
              echo "Still waiting for Metro... (${elapsed}s elapsed)"
            fi

            sleep 2
            elapsed=$((elapsed + 2))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "⚠️ Warning: Metro bundler may not be fully ready after ${timeout}s, proceeding anyway"
            echo "Metro process status:"
            ps aux | grep -E "metro|node.*start" | grep -v grep || echo "Metro process not found"
            echo ""
            echo "Last 30 lines of metro.log:"
            tail -30 metro.log
          else
            echo "Metro is serving on http://localhost:8081"
            # Give Metro time to fully initialize for iOS 26.2 (React Native bridge needs stabilization).
            # 20s should be sufficient for macos-15 to ensure full Metro compilation.
            # Without adequate wait, the app may fail with "No script URL provided" on launch.
            echo "Allowing Metro to fully stabilize (20s on macos-15)..."
            sleep 20

            # Verify Metro is actually serving the bundle (not just the process is running).
            # This catches cases where Metro reports ready but hasn't finished compilation.
            echo "Verifying Metro can serve bundles..."
            if curl -s http://localhost:8081/index.ios.bundle 2>/dev/null | grep -q "__d("; then
              echo "✅ Metro is serving bundles successfully"
            else
              echo "⚠️ Warning: Could not verify Metro is serving bundles, proceeding anyway"
              ps aux | grep -E "metro|node.*start" | grep -v grep || echo "Metro process not found"
            fi
          fi

          cd detox
          npm run detox:config-gen
          # Use read -ra to safely word-split space-separated spec paths without
          # glob expansion or shell injection from the matrix value.
          read -ra SPECS <<< "$MATRIX_SPECS"
          if [ "$DETOX_CONFIG" = "ios.ipad.debug" ]; then
            npm run e2e:ios-ipad-test -- "${SPECS[@]}"
          else
            npm run e2e:ios-test -- "${SPECS[@]}"
          fi
        env:
          DETOX_CONFIG: ${{ inputs.detox_config }}
          MATRIX_SPECS: ${{ matrix.specs }}
          DETOX_DISABLE_HIERARCHY_DUMP: "YES"
          DETOX_DISABLE_SCREENSHOT_TRACKING: "YES"
          DETOX_LOGLEVEL: "info"
          DETOX_DEVICE_TYPE: ${{ env.DEVICE_NAME }}
          DETOX_OS_VERSION: ${{ env.DEVICE_OS_VERSION }}
          LOW_BANDWIDTH_MODE: ${{ inputs.low_bandwidth_mode }}
          SITE_1_URL: ${{ env.SITE_1_URL }}
          SITE_2_URL: ${{ env.SITE_2_URL }}
          SITE_3_URL: ${{ env.SITE_3_URL }}

      - name: Cleanup Simulator State
        if: always()
        timeout-minutes: 2
        run: |
          echo "Cleaning up simulator state after tests..."

          # Kill the entire Metro process tree, not just the top-level PID.
          # `kill -9 $PID` only kills the npm wrapper; the actual Metro Node.js
          # workers and watchman stay alive. GitHub Actions waits ~10 min for
          # orphaned processes to die, causing the cleanup step to hang.
          if [ -n "$METRO_PID" ]; then
            echo "Stopping Metro bundler (PID: $METRO_PID) and child processes..."
            kill -9 -"$METRO_PID" 2>/dev/null || true
            pkill -9 -f "react-native.*start" 2>/dev/null || true
            pkill -9 -f "metro" 2>/dev/null || true
            sleep 1
          fi

          # Terminate app with a timeout — simctl terminate can hang on iOS 26.x
          if [ -n "$SIMULATOR_ID" ]; then
            echo "Terminating app on simulator..."
            timeout 10 xcrun simctl terminate "$SIMULATOR_ID" com.mattermost.rnbeta 2>/dev/null || true
            sleep 2
          fi

          echo "✅ Simulator cleanup complete"

      - name: reset network settings
        if: ${{ inputs.low_bandwidth_mode || failure() }}
        run: |
          networksetup -setwebproxystate Ethernet "off"
          networksetup -setsecurewebproxystate Ethernet "off"

          if (sudo pfctl -q -sa | grep 'Status: Enabled') then sudo pfctl -d; fi
          if (command  -v pm2 &> /dev/null) then pm2 stop mitmdump; fi

          sleep 5;

      - name: Upload mitmdump Flow Output
        if: ${{ inputs.low_bandwidth_mode }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-mitmdump-flow-output-${{ needs.generate-specs.outputs.workflow_hash }}-${{ matrix.runId }}
          path: |
            /Users/runner/work/mattermost-mobile/mattermost-mobile/flow-output.csv
            /Users/runner/work/mattermost-mobile/mattermost-mobile/mitmdump.log

      - name: Upload iOS Test Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-results-${{ needs.generate-specs.outputs.workflow_hash }}-${{ matrix.runId }}
          path: detox/artifacts/

  generate-report:
    if: always()
    runs-on: ubuntu-24.04
    needs:
      - generate-specs
      - e2e-ios
    outputs:
      TARGET_URL: ${{ steps.set-url.outputs.TARGET_URL }}
      STATUS: ${{ steps.determine-status.outputs.STATUS }}
      FAILURES: ${{ steps.summary.outputs.FAILURES }}
      PASSES: ${{ steps.summary.outputs.PASSES }}
      TOTAL: ${{ steps.summary.outputs.TOTAL }}
      SKIPPED: ${{ steps.summary.outputs.SKIPPED }}
      ERRORS: ${{ steps.summary.outputs.ERRORS }}
      PERCENTAGE: ${{ steps.summary.outputs.PERCENTAGE }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: ci/prepare-node-deps
        uses: ./.github/actions/prepare-node-deps

      - name: Download iOS Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: detox/artifacts/
          pattern: ios-results-${{ needs.generate-specs.outputs.workflow_hash }}-*

      - name: Generate Report Path
        id: s3
        run: |
          path="${{ needs.generate-specs.outputs.build_id }}-${{ needs.generate-specs.outputs.mobile_sha }}-${{ needs.generate-specs.outputs.mobile_ref }}"
          echo "path=$(echo "${path}" | sed 's/\./-/g')" >> ${GITHUB_OUTPUT}

      - name: Save report Detox Dependencies
        id: report-link
        run: |
          cd detox
          npm ci
          npm run e2e:save-report
        env:
          DETOX_AWS_ACCESS_KEY_ID: ${{ secrets.MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID }}
          DETOX_AWS_SECRET_ACCESS_KEY: ${{ secrets.MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY }}
          BUILD_ID: ${{ needs.generate-specs.outputs.build_id }}
          REPORT_PATH: ${{ steps.s3.outputs.path }}
          ## These are needed for the MM Webhook report
          COMMIT_HASH: ${{ needs.generate-specs.outputs.mobile_sha }}
          BRANCH: ${{ needs.generate-specs.outputs.mobile_ref }}

      - name: Calculate failures
        id: summary
        run: |
          if [ -f detox/artifacts/summary.json ]; then
            echo "FAILURES=$(cat detox/artifacts/summary.json | jq .stats.failures)" >> ${GITHUB_OUTPUT}
            echo "PASSES=$(cat detox/artifacts/summary.json | jq .stats.passes)" >> ${GITHUB_OUTPUT}
            echo "SKIPPED=$(cat detox/artifacts/summary.json | jq .stats.skipped)" >> ${GITHUB_OUTPUT}
            echo "TOTAL=$(cat detox/artifacts/summary.json | jq .stats.tests)" >> ${GITHUB_OUTPUT}
            echo "ERRORS=$(cat detox/artifacts/summary.json | jq .stats.errors)" >> ${GITHUB_OUTPUT}
            echo "PERCENTAGE=$(cat detox/artifacts/summary.json | jq .stats.passPercent)" >> ${GITHUB_OUTPUT}
          else
            echo "⚠️ No summary.json found — all test machines likely failed before producing results"
            echo "FAILURES=-1" >> ${GITHUB_OUTPUT}
            echo "PASSES=0" >> ${GITHUB_OUTPUT}
            echo "SKIPPED=0" >> ${GITHUB_OUTPUT}
            echo "TOTAL=0" >> ${GITHUB_OUTPUT}
            echo "ERRORS=0" >> ${GITHUB_OUTPUT}
            echo "PERCENTAGE=0" >> ${GITHUB_OUTPUT}
          fi

      - name: Set Target URL
        id: set-url
        run: |
            echo "TARGET_URL=https://${{ env.DETOX_AWS_S3_BUCKET }}.s3.amazonaws.com/${{ steps.s3.outputs.path }}/jest-stare/ios-report.html" >> ${GITHUB_OUTPUT}

      - name: Determine Status
        id: determine-status
        env:
          FAILURES: ${{ steps.summary.outputs.FAILURES }}
          TESTCASE_FAILURE_FATAL: ${{ inputs.testcase_failure_fatal }}
        run: |
          if [[ "$FAILURES" == "-1" ]]; then
            echo "STATUS=failure" >> ${GITHUB_OUTPUT}
          elif [[ "$FAILURES" -gt 0 && "$TESTCASE_FAILURE_FATAL" == "true" ]]; then
            echo "STATUS=failure" >> ${GITHUB_OUTPUT}
          else
            echo "STATUS=success" >> ${GITHUB_OUTPUT}
          fi

      - name: Generate Summary
        env:
          TOTAL: ${{ steps.summary.outputs.TOTAL }}
          PASSES: ${{ steps.summary.outputs.PASSES }}
          FAILURES: ${{ steps.summary.outputs.FAILURES }}
          SKIPPED: ${{ steps.summary.outputs.SKIPPED }}
          ERRORS: ${{ steps.summary.outputs.ERRORS }}
          PERCENTAGE: ${{ steps.summary.outputs.PERCENTAGE }}
          TARGET_URL: ${{ steps.set-url.outputs.TARGET_URL }}
        run: |
          echo "| Tests | Passed :white_check_mark: | Failed :x: | Skipped :fast_forward: | Errors :warning: | " >> ${GITHUB_STEP_SUMMARY}
          echo "|:---:|:---:|:---:|:---:|:---:|" >> ${GITHUB_STEP_SUMMARY}
          echo "| ${TOTAL} | ${PASSES} | ${FAILURES} | ${SKIPPED} | ${ERRORS} |" >> ${GITHUB_STEP_SUMMARY}
          echo "" >> ${GITHUB_STEP_SUMMARY}
          echo "You can check the full report [here](${TARGET_URL})" >> ${GITHUB_STEP_SUMMARY}
          echo "There was **${PERCENTAGE}%** success rate." >> ${GITHUB_STEP_SUMMARY}
