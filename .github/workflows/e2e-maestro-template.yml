name: Maestro E2E Tests Template

on:
  workflow_call:
    inputs:
      platform:
        description: "Platform to test on: ios or android"
        required: false
        type: string
        default: "ios"
      flow-path:
        description: "Path to the Maestro flow(s) to run (defaults differ by platform)"
        required: false
        type: string
        default: ""
      MM_TEST_SERVER_URL:
        description: "The test server URL"
        required: false
        type: string
      MOBILE_VERSION:
        description: "The mobile version to test"
        required: false
        default: ""
        type: string
      run-type:
        description: "Type of run (PR, MAIN, etc.)"
        required: false
        type: string
        default: "PR"
      artifact_run_id:
        description: "GitHub run ID of the workflow that uploaded ios-build-simulator-* (defaults to this run)"
        required: false
        type: string
        default: ""
    outputs:
      STATUS:
        value: ${{ jobs.e2e-maestro-ios.outputs.STATUS || jobs.e2e-maestro-android.outputs.STATUS }}
      TARGET_URL:
        value: ${{ jobs.e2e-maestro-ios.outputs.TARGET_URL || jobs.e2e-maestro-android.outputs.TARGET_URL }}
      FAILURES:
        value: ${{ jobs.e2e-maestro-ios.outputs.FAILURES || jobs.e2e-maestro-android.outputs.FAILURES }}
      PASSES:
        value: ${{ jobs.e2e-maestro-ios.outputs.PASSES || jobs.e2e-maestro-android.outputs.PASSES }}
      TOTAL:
        value: ${{ jobs.e2e-maestro-ios.outputs.TOTAL || jobs.e2e-maestro-android.outputs.TOTAL }}
      SKIPPED:
        value: ${{ jobs.e2e-maestro-ios.outputs.SKIPPED || jobs.e2e-maestro-android.outputs.SKIPPED }}
      PERCENTAGE:
        value: ${{ jobs.e2e-maestro-ios.outputs.PERCENTAGE || jobs.e2e-maestro-android.outputs.PERCENTAGE }}

# Least-privilege token: maestro jobs only check out code and talk to the test
# server / AWS via dedicated secrets — they never use GITHUB_TOKEN for writes.
# Setting this here caps the token for every caller of this reusable workflow.
permissions:
  contents: read
env:
  ADMIN_EMAIL: ${{ secrets.MM_MOBILE_E2E_ADMIN_EMAIL }}
  ADMIN_USERNAME: ${{ secrets.MM_MOBILE_E2E_ADMIN_USERNAME }}
  ADMIN_PASSWORD: ${{ secrets.MM_MOBILE_E2E_ADMIN_PASSWORD }}
  SITE_1_URL: ${{ inputs.MM_TEST_SERVER_URL }}
  TYPE: ${{ inputs.run-type }}
  DETOX_AWS_S3_BUCKET: "mattermost-detox-report"
  AWS_REGION: "us-east-1"
  # iOS .app artifact is uploaded by e2e-detox-pr.yml / e2e-maestro-pr.yml under
  # ios-build-simulator-<run_id>. When this template is nested, that run_id is
  # the parent's, not this workflow's.
  ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id || github.run_id }}

jobs:
  e2e-maestro-ios:
    name: Maestro E2E Tests (iOS)
    if: ${{ inputs.platform == 'ios' || inputs.platform == '' }}
    runs-on: macos-26
    timeout-minutes: 60
    outputs:
      STATUS: ${{ steps.determine-status.outputs.STATUS }}
      TARGET_URL: ${{ steps.set-url.outputs.TARGET_URL }}
      FAILURES: ${{ steps.summary.outputs.FAILURES }}
      PASSES: ${{ steps.summary.outputs.PASSES }}
      TOTAL: ${{ steps.summary.outputs.TOTAL }}
      SKIPPED: ${{ steps.summary.outputs.SKIPPED }}
      PERCENTAGE: ${{ steps.summary.outputs.PERCENTAGE }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: ci/prepare-node-deps
        uses: ./.github/actions/prepare-node-deps

      # disable_ios_autofill.js (called later during simulator boot) lives in
      # detox/utils/ and requires `shelljs` from detox/package.json. The repo-root
      # `prepare-node-deps` only installs top-level node_modules, so we need a
      # separate install for the detox sub-package or the script throws
      # `Cannot find module 'shelljs'`.
      - name: Install Detox Dependencies
        run: cd detox && npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Maestro
        id: maestro-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.maestro
          key: maestro-f3dd692588e86691dfe79889d1a6117ab7a94d50

      - name: Install Maestro CLI
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          MAESTRO_VERSION=$(jq -r .version maestro/maestro-version.json)
          MAESTRO_COMMIT=$(jq -r .commit maestro/maestro-version.json)
          echo "Installing Maestro ${MAESTRO_VERSION} (pinned to commit ${MAESTRO_COMMIT})"
          export MAESTRO_VERSION
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          MAESTRO_BIN="$HOME/.maestro/bin/maestro"
          if [ ! -f "$MAESTRO_BIN" ]; then
            echo "Error: Maestro binary not found at $MAESTRO_BIN"
            exit 1
          fi
          echo "Maestro installed successfully at $MAESTRO_BIN"
          "$MAESTRO_BIN" --version

      - name: Verify Maestro installation
        run: ~/.maestro/bin/maestro --version

      - name: Download iOS Simulator Build
        uses: actions/download-artifact@c850b930e6ba138125429b7e5c93fc707a7f8427 # v4.1.4
        with:
          name: ios-build-simulator-${{ env.ARTIFACT_RUN_ID }}
          # Reusable workflows have their own github.run_id; when Maestro is
          # nested under e2e-detox-pr.yml the .app artifact lives on the caller run.
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: mobile-artifacts

      - name: Unzip iOS Simulator Build
        run: |
          unzip -o mobile-artifacts/*.zip -d mobile-artifacts/
          rm -f mobile-artifacts/*.zip

      - name: Pre-boot iOS Simulator
        run: |
          set -e
          DEVICE_NAME="iPhone 17 Pro"
          DEVICE_OS_VERSION="iOS 26.2"

          echo "Looking for simulator: $DEVICE_NAME with $DEVICE_OS_VERSION"

          SIMULATOR_ID=$(xcrun simctl list devices | grep "$DEVICE_NAME" | grep "$DEVICE_OS_VERSION" | head -1 | grep -oE '([0-9A-F-]{36})' || true)

          if [ -z "$SIMULATOR_ID" ]; then
            echo "Simulator not found. Creating simulator $DEVICE_NAME with $DEVICE_OS_VERSION"

            DEVICE_TYPE=$(xcrun simctl list devicetypes | grep "$DEVICE_NAME (" | head -1 | awk -F'[()]' '{print $(NF-1)}')
            if [ -z "$DEVICE_TYPE" ]; then
              echo "Error: Could not find device type for $DEVICE_NAME"
              exit 1
            fi
            echo "Found device type: $DEVICE_TYPE"

            RUNTIME=$(xcrun simctl list runtimes | grep "$DEVICE_OS_VERSION" | head -1 | sed 's/.* - \(.*\)/\1/')
            if [ -z "$RUNTIME" ]; then
              echo "Error: Could not find runtime for $DEVICE_OS_VERSION"
              exit 1
            fi
            echo "Found runtime: $RUNTIME"

            SIMULATOR_ID=$(xcrun simctl create "CI-$DEVICE_NAME" "$DEVICE_TYPE" "$RUNTIME")
            echo "Created simulator with ID: $SIMULATOR_ID"
          else
            echo "Found existing simulator: $SIMULATOR_ID"
          fi

          xcrun simctl boot "$SIMULATOR_ID"
          xcrun simctl bootstatus "$SIMULATOR_ID"

          # Disable password autofill to prevent "Save Password?" dialogs blocking tests
          echo "Shutting down to apply password autofill restrictions..."
          xcrun simctl shutdown "$SIMULATOR_ID"
          sleep 3

          SETTINGS_DIR="$HOME/Library/Developer/CoreSimulator/Devices/$SIMULATOR_ID/data/Containers/Shared/SystemGroup/systemgroup.com.apple.configurationprofiles/Library/ConfigurationProfiles"
          mkdir -p "$SETTINGS_DIR"
          node detox/utils/disable_ios_autofill.js --simulator-id "$SIMULATOR_ID"
          if [ $? -ne 0 ]; then
            echo "⚠️ Failed to disable password autofill"
            exit 1
          fi

          echo "Booting simulator with password autofill disabled..."
          xcrun simctl boot "$SIMULATOR_ID"
          xcrun simctl bootstatus "$SIMULATOR_ID"

          open -a Simulator --args -CurrentDeviceUDID "$SIMULATOR_ID"
          # Poll until Simulator.app has rendered the device (listapps succeeds only
          # once SpringBoard is fully running and Simulator.app has attached).
          for i in $(seq 1 30); do
            xcrun simctl listapps "$SIMULATOR_ID" &>/dev/null && break
            sleep 2
          done

          echo "SIMULATOR_ID=$SIMULATOR_ID" >> $GITHUB_ENV

      - name: Install app on iOS Simulator
        run: |
          APP_PATH=$(find mobile-artifacts -name "*.app" -maxdepth 2 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app bundle in mobile-artifacts/"
            ls -la mobile-artifacts/
            exit 1
          fi
          echo "Installing app from: $APP_PATH"

          # Patch UIFileSharingEnabled BEFORE install so iOS registers file sharing
          # at install time. Patching post-install is cached by iOS and ignored until
          # the next simulator reboot, making the Documents folder invisible in Files app.
          plutil -replace UIFileSharingEnabled -bool true "$APP_PATH/Info.plist" 2>/dev/null || \
            plutil -insert UIFileSharingEnabled -bool true "$APP_PATH/Info.plist" 2>/dev/null || true
          plutil -replace LSSupportsOpeningDocumentsInPlace -bool true "$APP_PATH/Info.plist" 2>/dev/null || \
            plutil -insert LSSupportsOpeningDocumentsInPlace -bool true "$APP_PATH/Info.plist" 2>/dev/null || true
          echo "UIFileSharingEnabled patched in Info.plist"

          xcrun simctl install "$SIMULATOR_ID" "$APP_PATH"

          # Grant all privacy permissions (camera, photos, microphone, notifications, etc.)
          xcrun simctl privacy "$SIMULATOR_ID" grant all com.mattermost.rnbeta
          echo "All privacy permissions granted"

      - name: Place test fixture file in app Documents (channel_bookmark_file flow)
        run: |
          FIXTURE="detox/e2e/support/fixtures/image.png"
          if [ ! -f "$FIXTURE" ]; then
            echo "Fixture file not found at $FIXTURE — skipping document setup"
            exit 0
          fi
          APP_DATA=$(xcrun simctl get_app_container "$SIMULATOR_ID" com.mattermost.rnbeta data 2>/dev/null || true)
          if [ -z "$APP_DATA" ]; then
            echo "App data container not found — app may not be installed yet; skipping"
            exit 0
          fi
          DOCS_DIR="$APP_DATA/Documents"
          mkdir -p "$DOCS_DIR"
          cp "$FIXTURE" "$DOCS_DIR/test_bookmark.png"
          echo "Copied test fixture to $DOCS_DIR/test_bookmark.png"

      - name: Set simulator timezone for timezone flow
        run: |
          # MM-T1325: set timezone before any flow runs; launchApp:stopApp:true in the flow
          # will restart the app so it picks up the new timezone.
          # 'xcrun simctl timezone' was removed in Xcode 26; 'defaults write' doesn't affect
          # [NSTimeZone localTimeZone] either. 'launchctl setenv TZ' sets it in launchd so
          # all new child processes (including the restarted app) inherit the correct timezone.
          xcrun simctl spawn "$SIMULATOR_ID" launchctl setenv TZ "America/New_York"
          echo "Simulator timezone set to America/New_York"

      - name: Seed test data
        run: |
          cd maestro
          npm install
          npx tsx fixtures/seed.ts
        env:
          SITE_1_URL: ${{ env.SITE_1_URL }}
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_USERNAME: ${{ env.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}

      - name: Push test fixture into iOS simulator
        # Required by maestro/flows/channels/channel_bookmark_file.yml: the
        # iOS document picker can only see files that already exist in the
        # local File Provider storage at maestro launch time. We drop the
        # detox image fixture there so the picker's "On My iPhone > Browse"
        # path can reach it. Android does the equivalent via `adb push` in
        # the Android job below.
        #
        # Best-effort: every command is allowed to fail without failing the
        # job. `channel_bookmark_file.yml` will surface a missing fixture as
        # a flow failure if this step couldn't place it.
        #
        # The previous implementation used a python one-liner that crashed
        # with IndexError when the first runtime in simctl's JSON had an
        # empty device array. Grep-the-UDID-format is simpler and never
        # raises — if no UDID is found, `set -e` is bypassed by `|| true`.
        continue-on-error: true
        run: |
          set +e
          UDID=$(xcrun simctl list devices booted 2>/dev/null | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | head -1)
          if [ -z "$UDID" ]; then
            echo "Warning: no booted iOS simulator found; skipping fixture push"
            exit 0
          fi
          echo "Resolved booted simulator UDID: $UDID"
          LOCAL_STORAGE=$(find "$HOME/Library/Developer/CoreSimulator/Devices/$UDID/data/Containers/Shared/AppGroup" \
            -name ".com.apple.mobile_container_manager.metadata.plist" \
            -exec grep -l "FileProvider.LocalStorage" {} \; 2>/dev/null | xargs -I{} dirname {} | head -1)
          if [ -n "$LOCAL_STORAGE" ]; then
            mkdir -p "$LOCAL_STORAGE/File Provider Storage"
            cp detox/e2e/support/fixtures/image.png "$LOCAL_STORAGE/File Provider Storage/test_bookmark.png"
            echo "Pushed test fixture to $LOCAL_STORAGE/File Provider Storage/test_bookmark.png"
          else
            echo "Warning: FileProvider.LocalStorage container not found; channel_bookmark_file.yml may fail"
          fi

      - name: Resolve flow path
        id: resolve-flow-path
        env:
          FLOW_PATH_INPUT: ${{ inputs.flow-path }}
        run: |
          if [ -n "$FLOW_PATH_INPUT" ]; then
            # Reject anything outside a safe whitelist (paths, spaces, dashes)
            # to prevent command injection via the workflow input.
            if ! printf '%s' "$FLOW_PATH_INPUT" | grep -Eq '^[A-Za-z0-9_./ -]+$'; then
              echo "Invalid flow-path input: $FLOW_PATH_INPUT"
              exit 1
            fi
            printf 'flow_path=%s\n' "$FLOW_PATH_INPUT" >> "$GITHUB_OUTPUT"
          else
            # iOS: run single-device flows. seed.ts now enables Calls in the
            # test channel (POST /plugins/com.mattermost.calls/{channelId}),
            # so start_call / mute_unmute / leave_call run here without a
            # separate calls_seed.ts step.
            # Excluded: file_type_preview.yml (requires seed_file_preview.ts for file IDs)
            #           channel_bookmark_file_android_picker.yml (Android-only picker)
            printf 'flow_path=%s\n' "maestro/flows/account maestro/flows/calls maestro/flows/channels/channel_bookmark_file.yml maestro/flows/channels/channel_bookmark_link_external.yml maestro/flows/share_extension maestro/flows/timezone" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Maestro Flows (iOS)
        env:
          FLOW_PATH: ${{ steps.resolve-flow-path.outputs.flow_path }}
        run: |
          set -a
          source maestro/.maestro-test-env.sh
          set +a

          mkdir -p build
          # Split the (already validated) space-separated path list into an
          # array so it expands as distinct args without re-globbing/injection.
          read -r -a FLOW_PATH_ARR <<< "$FLOW_PATH"

          # Exclude MM-T67856_4 from the main run — it requires
          # AllowDownloadLogs=false on the server, set in the dedicated step
          # below. All other flows assume the default `true`.
          ~/.maestro/bin/maestro test \
            --format junit \
            --output build/maestro-report.xml \
            --test-output-dir build/maestro-artifacts \
            --flatten-debug-output \
            --exclude-tags=MM-T67856_4 \
            --env SITE_1_URL="${SITE_1_URL}" \
            --env TEST_USER_EMAIL="${TEST_USER_EMAIL}" \
            --env TEST_USER_PASSWORD="${TEST_USER_PASSWORD}" \
            --env TEST_CHANNEL_NAME="${TEST_CHANNEL_NAME}" \
            --env TEST_TEAM_NAME="${TEST_TEAM_NAME}" \
            --env ADMIN_TOKEN="${ADMIN_TOKEN}" \
            --env MAESTRO_APP_ID="com.mattermost.rnbeta" \
            "${FLOW_PATH_ARR[@]}"

      - name: Run MM-T67856_4 with AllowDownloadLogs=false (iOS)
        # Isolated step: patch the server config to AllowDownloadLogs=false,
        # run the single flow, then restore. Always restore even on failure.
        # Failure here does not fail the job — the main report is the source
        # of truth; this is additive coverage.
        if: always()
        continue-on-error: true
        run: |
          set -a
          source maestro/.maestro-test-env.sh
          set +a

          # AllowDownloadLogs lives under SupportSettings (not ServiceSettings)
          # in the Mattermost server config — verified during local maestro
          # iteration against SITE_1_URL.
          echo "==> Patching SupportSettings.AllowDownloadLogs=false on ${SITE_1_URL}"
          curl -sS -X PUT \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"SupportSettings":{"AllowDownloadLogs":false}}' \
            "${SITE_1_URL}/api/v4/config/patch" > /dev/null

          # Always restore the default before exiting this step, regardless
          # of whether the maestro run passes.
          trap 'curl -sS -X PUT \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"SupportSettings\":{\"AllowDownloadLogs\":true}}" \
            "${SITE_1_URL}/api/v4/config/patch" > /dev/null && \
            echo "==> Restored AllowDownloadLogs=true"' EXIT

          ~/.maestro/bin/maestro test \
            --format junit \
            --output build/maestro-report-T67856_4.xml \
            --test-output-dir build/maestro-artifacts-T67856_4 \
            --flatten-debug-output \
            --env SITE_1_URL="${SITE_1_URL}" \
            --env TEST_USER_EMAIL="${TEST_USER_EMAIL}" \
            --env TEST_USER_PASSWORD="${TEST_USER_PASSWORD}" \
            --env TEST_CHANNEL_NAME="${TEST_CHANNEL_NAME}" \
            --env TEST_TEAM_NAME="${TEST_TEAM_NAME}" \
            --env ADMIN_TOKEN="${ADMIN_TOKEN}" \
            --env MAESTRO_APP_ID="com.mattermost.rnbeta" \
            maestro/flows/account/attach_logs_disabled_when_download_logs_off.yml

      - name: Upload Maestro Artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: maestro-ios-results-${{ github.run_id }}
          path: build/

      - name: Parse Maestro Report
        id: summary
        if: always()
        run: |
          cd detox
          npm ci --prefer-offline --no-audit --no-fund
          node -e "
            const {parseMaestroReport, generateMaestroHtmlReport} = require('./utils/maestro_report');
            const summary = parseMaestroReport('../build/maestro-report.xml');
            const fs = require('fs');
            if (summary) {
              const s = summary.stats;
              const output = [
                'FAILURES=' + s.failures,
                'PASSES=' + s.passes,
                'TOTAL=' + s.tests,
                'ERRORS=' + s.errors,
                'SKIPPED=' + s.skipped,
                'PERCENTAGE=' + s.passPercent,
              ];
              output.forEach(l => fs.appendFileSync(process.env.GITHUB_OUTPUT, l + '\n'));

              // Generate a rich HTML report (stats + per-flow drill-down with
              // inline screenshots + log links). Lives next to maestro-artifacts/
              // so relative <img src> URLs resolve when viewed from S3.
              generateMaestroHtmlReport({
                xmlPath: '../build/maestro-report.xml',
                artifactsDir: '../build/maestro-artifacts',
                outputPath: '../build/maestro-report.html',
                platform: 'iOS',
                commitSha: process.env.GITHUB_SHA || '',
              });
            } else {
              console.log('No Maestro report found — marking as failure');
              ['FAILURES=1','PASSES=0','TOTAL=0','ERRORS=1','SKIPPED=0','PERCENTAGE=0','NO_REPORT=true'].forEach(l => fs.appendFileSync(process.env.GITHUB_OUTPUT, l + '\n'));
            }
          "

      - name: Upload Maestro Report to S3
        if: always()
        run: |
          cd detox
          node -e "
            const {saveArtifacts} = require('./utils/artifacts');
            const fse = require('fs-extra');
            fse.copySync('../build', './artifacts/maestro-ios', {overwrite: true});
            saveArtifacts('maestro-ios').then(r => {
              if (r && r.success) console.log('Uploaded:', r.reportLink);
            }).catch(e => console.log('S3 upload skipped:', e.message));
          "
        env:
          DETOX_AWS_ACCESS_KEY_ID: ${{ secrets.MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID }}
          DETOX_AWS_SECRET_ACCESS_KEY: ${{ secrets.MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY }}
          DETOX_AWS_S3_BUCKET: ${{ env.DETOX_AWS_S3_BUCKET }}
          REPORT_PATH: maestro-ios-${{ github.run_id }}

      - name: Set Target URL
        id: set-url
        if: always()
        env:
          S3_BUCKET: ${{ env.DETOX_AWS_S3_BUCKET }}
        run: |
          # Point at the HTML report generated above. It's uploaded inside
          # detox/artifacts/maestro-ios/, which lands at the maestro-ios/
          # path segment under the S3 prefix.
          echo "TARGET_URL=https://${S3_BUCKET:-mattermost-detox-report}.s3.amazonaws.com/maestro-ios-${{ github.run_id }}/maestro-ios/maestro-report.html" >> "$GITHUB_OUTPUT"

      - name: Determine Status
        id: determine-status
        if: always()
        run: |
          FAILURES="${{ steps.summary.outputs.FAILURES }}"
          if [[ "${FAILURES:-0}" -gt 0 ]]; then
            echo "STATUS=failure" >> "$GITHUB_OUTPUT"
          else
            echo "STATUS=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Summary
        if: always()
        run: |
          echo "### Maestro iOS E2E Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | Passed :white_check_mark: | Failed :x: | Skipped :fast_forward: |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:---:|:---:|:---:|:---:|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ steps.summary.outputs.TOTAL }} | ${{ steps.summary.outputs.PASSES }} | ${{ steps.summary.outputs.FAILURES }} | ${{ steps.summary.outputs.SKIPPED }} |" >> "$GITHUB_STEP_SUMMARY"

  e2e-maestro-android:
    name: Maestro E2E Tests (Android)
    if: ${{ inputs.platform == 'android' }}
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 60
    outputs:
      STATUS: ${{ steps.determine-status.outputs.STATUS }}
      TARGET_URL: ${{ steps.set-url.outputs.TARGET_URL }}
      FAILURES: ${{ steps.summary.outputs.FAILURES }}
      PASSES: ${{ steps.summary.outputs.PASSES }}
      TOTAL: ${{ steps.summary.outputs.TOTAL }}
      SKIPPED: ${{ steps.summary.outputs.SKIPPED }}
      PERCENTAGE: ${{ steps.summary.outputs.PERCENTAGE }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: ci/prepare-node-deps
        uses: ./.github/actions/prepare-node-deps

      - name: Cache Maestro
        id: maestro-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.maestro
          key: maestro-f3dd692588e86691dfe79889d1a6117ab7a94d50-linux

      - name: Install Maestro CLI
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: |
          MAESTRO_VERSION=$(jq -r .version maestro/maestro-version.json)
          MAESTRO_COMMIT=$(jq -r .commit maestro/maestro-version.json)
          echo "Installing Maestro ${MAESTRO_VERSION} (pinned to commit ${MAESTRO_COMMIT})"
          export MAESTRO_VERSION
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          MAESTRO_BIN="$HOME/.maestro/bin/maestro"
          if [ ! -f "$MAESTRO_BIN" ]; then
            echo "Error: Maestro binary not found at $MAESTRO_BIN"
            exit 1
          fi
          echo "Maestro installed successfully at $MAESTRO_BIN"
          "$MAESTRO_BIN" --version

      - name: Verify Maestro installation
        run: ~/.maestro/bin/maestro --version

      - name: ci/setup-java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      # Same key as e2e-detox-pr.yml's build-android-apk + e2e-detox-release.yml,
      # so the maestro self-build shares the cache populated by detox runs.
      - name: Cache Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.gradle/caches/modules-2/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: ci/jetify-android-libraries
        run: ./node_modules/.bin/jetify

      - name: Build Android Release APK for Maestro
        env:
          ORG_GRADLE_PROJECT_jvmargs: -Xmx6g
        run: |
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Seed test data
        run: |
          cd maestro
          npm install
          npx tsx fixtures/seed.ts
        env:
          SITE_1_URL: ${{ env.SITE_1_URL }}
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_USERNAME: ${{ env.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}

      - name: Resolve flow path
        id: resolve-flow-path
        env:
          FLOW_PATH_INPUT: ${{ inputs.flow-path }}
        run: |
          if [ -n "$FLOW_PATH_INPUT" ]; then
            # Reject anything outside a safe whitelist (paths, spaces, dashes)
            # to prevent command injection via the workflow input.
            if ! printf '%s' "$FLOW_PATH_INPUT" | grep -Eq '^[A-Za-z0-9_./ -]+$'; then
              echo "Invalid flow-path input: $FLOW_PATH_INPUT"
              exit 1
            fi
            printf 'flow_path=%s\n' "$FLOW_PATH_INPUT" >> "$GITHUB_OUTPUT"
          else
            # Android: skip share_extension (cross-app) and multi_device.
            # The two-device orchestration flows that only work via
            # run_calls_two_device.sh live in maestro/flows/multi_device/ and
            # are excluded by not listing that directory.
            #
            # Channel bookmarks: channel_bookmark_file.yml is cross-platform
            # — it branches into the OS-specific *_picker.yml sub-flow via
            # `platform:` clauses. File fixture is pushed via `adb push` in
            # the "Install APK" step. channel_bookmark_link_external is
            # also cross-platform.
            printf 'flow_path=%s\n' "maestro/flows/account maestro/flows/calls maestro/flows/channels/channel_bookmark_file.yml maestro/flows/channels/channel_bookmark_link_external.yml maestro/flows/timezone" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Android SDK components
        id: android-sdk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /usr/local/lib/android/sdk/platform-tools
            /usr/local/lib/android/sdk/emulator
            /usr/local/lib/android/sdk/platforms/android-34
            /usr/local/lib/android/sdk/system-images/android-34
          key: android-sdk-34-google-apis-x86_64-v1

      - name: Install Android SDK components
        if: steps.android-sdk-cache.outputs.cache-hit != 'true'
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          for attempt in 1 2 3; do
            yes | sdkmanager --install \
              "platform-tools" "emulator" \
              "platforms;android-34" \
              "system-images;android-34;google_apis;x86_64" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Create and boot Android emulator
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_AVD_HOME=$(pwd)/.android/avd
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$PATH
          mkdir -p "$ANDROID_AVD_HOME"

          echo "no" | avdmanager create avd -n maestro_avd \
            -k "system-images;android-34;google_apis;x86_64" \
            -d "pixel_4_xl" --force

          nohup emulator -avd maestro_avd \
            -no-snapshot-save -no-window -gpu swiftshader_indirect \
            -noaudio -no-boot-anim -camera-back none \
            -accel on -qemu -m 8192 &

          # Wait for boot with 5-minute timeout
          adb wait-for-device
          boot_timeout=300
          boot_elapsed=0
          until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; do
            if [ $boot_elapsed -ge $boot_timeout ]; then
              echo "Emulator failed to boot within 5 minutes"
              exit 1
            fi
            echo "Waiting for emulator to fully boot... (${boot_elapsed}s)"
            sleep 10
            boot_elapsed=$((boot_elapsed + 10))
          done

          # Wait for package manager to be ready (more reliable than sleep 15)
          for i in $(seq 1 30); do
            adb shell pm list packages > /dev/null 2>&1 && break
            sleep 2
          done
          echo "Emulator is fully ready."

          # Persist SDK env for subsequent steps
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_AVD_HOME=$ANDROID_AVD_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH

      - name: Configure emulator
        run: |
          # Disable animations to prevent flakiness
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell input keyevent 82

          # Set timezone for MM-T1325 timezone flow.
          # persist.sys.timezone survives reboots but only takes effect at boot time.
          # Setting sys.timezone and broadcasting TIMEZONE_CHANGED forces the running
          # system to pick up the new timezone without a reboot.
          adb root
          adb shell setprop persist.sys.timezone "America/New_York"
          adb shell setprop sys.timezone "America/New_York"
          adb shell am broadcast -a android.intent.action.TIMEZONE_CHANGED \
            --ez bypassUserRestrictions true 2>/dev/null || true

      - name: Install APK on emulator
        run: |
          # Locally-built release APK (single fat APK because gradle.properties
          # does not enable `enableSeparateBuildPerCPUArchitecture`).
          APK_PATH=$(find android/app/build/outputs/apk/release -name "app-release.apk" -o -name "app-*-release.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Could not find release APK in android/app/build/outputs/apk/release/"
            ls -la android/app/build/outputs/apk/release/ || true
            exit 1
          fi
          echo "Installing APK from: $APK_PATH"
          # Retry install up to 3 times — adb install can fail transiently on CI
          for attempt in 1 2 3; do
            adb install -r "$APK_PATH" && break
            echo "Install attempt $attempt failed, retrying..."
            sleep 5
          done

          # Push test fixture file for bookmark flow
          FIXTURE="detox/e2e/support/fixtures/image.png"
          if [ -f "$FIXTURE" ]; then
            adb push "$FIXTURE" /sdcard/Download/test_bookmark.png
            echo "Pushed test fixture to /sdcard/Download/test_bookmark.png"
          fi

      - name: Run Maestro Flows (Android)
        env:
          FLOW_PATH: ${{ steps.resolve-flow-path.outputs.flow_path }}
        run: |
          set -a
          source maestro/.maestro-test-env.sh
          set +a

          mkdir -p build
          # Split the (already validated) space-separated path list into an
          # array so it expands as distinct args without re-globbing/injection.
          read -r -a FLOW_PATH_ARR <<< "$FLOW_PATH"

          # Exclude MM-T67856_4 from the main run (requires
          # AllowDownloadLogs=false; handled by the dedicated step below).
          ~/.maestro/bin/maestro test \
            --format junit \
            --output build/maestro-report.xml \
            --test-output-dir build/maestro-artifacts \
            --flatten-debug-output \
            --platform android \
            --exclude-tags=MM-T67856_4 \
            --env SITE_1_URL="${SITE_1_URL}" \
            --env TEST_USER_EMAIL="${TEST_USER_EMAIL}" \
            --env TEST_USER_PASSWORD="${TEST_USER_PASSWORD}" \
            --env TEST_CHANNEL_NAME="${TEST_CHANNEL_NAME}" \
            --env TEST_TEAM_NAME="${TEST_TEAM_NAME}" \
            --env ADMIN_TOKEN="${ADMIN_TOKEN}" \
            --env MAESTRO_APP_ID="com.mattermost.rnbeta" \
            "${FLOW_PATH_ARR[@]}"

      - name: Run MM-T67856_4 with AllowDownloadLogs=false (Android)
        # Isolated step: patch server config to AllowDownloadLogs=false, run
        # the single flow, restore on exit. continue-on-error so the main
        # report stays authoritative.
        if: always()
        continue-on-error: true
        run: |
          set -a
          source maestro/.maestro-test-env.sh
          set +a

          # AllowDownloadLogs lives under SupportSettings (not ServiceSettings)
          # in the Mattermost server config — verified during local maestro
          # iteration against SITE_1_URL.
          echo "==> Patching SupportSettings.AllowDownloadLogs=false on ${SITE_1_URL}"
          curl -sS -X PUT \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"SupportSettings":{"AllowDownloadLogs":false}}' \
            "${SITE_1_URL}/api/v4/config/patch" > /dev/null

          trap 'curl -sS -X PUT \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"SupportSettings\":{\"AllowDownloadLogs\":true}}" \
            "${SITE_1_URL}/api/v4/config/patch" > /dev/null && \
            echo "==> Restored AllowDownloadLogs=true"' EXIT

          ~/.maestro/bin/maestro test \
            --format junit \
            --output build/maestro-report-T67856_4.xml \
            --test-output-dir build/maestro-artifacts-T67856_4 \
            --flatten-debug-output \
            --platform android \
            --env SITE_1_URL="${SITE_1_URL}" \
            --env TEST_USER_EMAIL="${TEST_USER_EMAIL}" \
            --env TEST_USER_PASSWORD="${TEST_USER_PASSWORD}" \
            --env TEST_CHANNEL_NAME="${TEST_CHANNEL_NAME}" \
            --env TEST_TEAM_NAME="${TEST_TEAM_NAME}" \
            --env ADMIN_TOKEN="${ADMIN_TOKEN}" \
            --env MAESTRO_APP_ID="com.mattermost.rnbeta" \
            maestro/flows/account/attach_logs_disabled_when_download_logs_off.yml

      - name: Upload Maestro Artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: maestro-android-results-${{ github.run_id }}
          path: build/

      - name: Parse Maestro Report
        id: summary
        if: always()
        run: |
          cd detox
          npm ci --prefer-offline --no-audit --no-fund
          node -e "
            const {parseMaestroReport, generateMaestroHtmlReport} = require('./utils/maestro_report');
            const summary = parseMaestroReport('../build/maestro-report.xml');
            const fs = require('fs');
            if (summary) {
              const s = summary.stats;
              const output = [
                'FAILURES=' + s.failures,
                'PASSES=' + s.passes,
                'TOTAL=' + s.tests,
                'ERRORS=' + s.errors,
                'SKIPPED=' + s.skipped,
                'PERCENTAGE=' + s.passPercent,
              ];
              output.forEach(l => fs.appendFileSync(process.env.GITHUB_OUTPUT, l + '\n'));

              // Generate a rich HTML report (stats + per-flow drill-down with
              // inline screenshots + log links). See maestro iOS notes above.
              generateMaestroHtmlReport({
                xmlPath: '../build/maestro-report.xml',
                artifactsDir: '../build/maestro-artifacts',
                outputPath: '../build/maestro-report.html',
                platform: 'Android',
                commitSha: process.env.GITHUB_SHA || '',
              });
            } else {
              console.log('No Maestro report found — marking as failure');
              ['FAILURES=1','PASSES=0','TOTAL=0','ERRORS=1','SKIPPED=0','PERCENTAGE=0','NO_REPORT=true'].forEach(l => fs.appendFileSync(process.env.GITHUB_OUTPUT, l + '\n'));
            }
          "

      - name: Upload Maestro Report to S3
        if: always()
        run: |
          cd detox
          node -e "
            const {saveArtifacts} = require('./utils/artifacts');
            const fse = require('fs-extra');
            fse.copySync('../build', './artifacts/maestro-android', {overwrite: true});
            saveArtifacts('maestro-android').then(r => {
              if (r && r.success) console.log('Uploaded:', r.reportLink);
            }).catch(e => console.log('S3 upload skipped:', e.message));
          "
        env:
          DETOX_AWS_ACCESS_KEY_ID: ${{ secrets.MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID }}
          DETOX_AWS_SECRET_ACCESS_KEY: ${{ secrets.MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY }}
          DETOX_AWS_S3_BUCKET: ${{ env.DETOX_AWS_S3_BUCKET }}
          REPORT_PATH: maestro-android-${{ github.run_id }}

      - name: Set Target URL
        id: set-url
        if: always()
        env:
          S3_BUCKET: ${{ env.DETOX_AWS_S3_BUCKET }}
        run: |
          # Point at the HTML report generated above.
          echo "TARGET_URL=https://${S3_BUCKET:-mattermost-detox-report}.s3.amazonaws.com/maestro-android-${{ github.run_id }}/maestro-android/maestro-report.html" >> "$GITHUB_OUTPUT"

      - name: Determine Status
        id: determine-status
        if: always()
        run: |
          FAILURES="${{ steps.summary.outputs.FAILURES }}"
          if [[ "${FAILURES:-0}" -gt 0 ]]; then
            echo "STATUS=failure" >> "$GITHUB_OUTPUT"
          else
            echo "STATUS=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Summary
        if: always()
        run: |
          echo "### Maestro Android E2E Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | Passed :white_check_mark: | Failed :x: | Skipped :fast_forward: |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:---:|:---:|:---:|:---:|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ steps.summary.outputs.TOTAL }} | ${{ steps.summary.outputs.PASSES }} | ${{ steps.summary.outputs.FAILURES }} | ${{ steps.summary.outputs.SKIPPED }} |" >> "$GITHUB_STEP_SUMMARY"
