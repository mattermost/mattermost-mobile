name: CMT Provisioner

# CMT signal workflow — matterwick provisions servers and dispatches compatibility-matrix-testing.yml on workflow_run:requested.

on:
  push:
    branches:
      - "build-release-[0-9][0-9][0-9]"
      - "build-release-[0-9][0-9][0-9][0-9]"
  workflow_dispatch: {}

permissions: {}

jobs:
  signal:
    runs-on: ubuntu-22.04
    steps:
      - name: Signal matterwick
        run: echo "CMT provisioning requested — matterwick will handle provisioning and dispatch."
