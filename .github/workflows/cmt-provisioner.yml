name: CMT Provisioner

# This workflow is the entry point for Matterwick-driven Compatibility Matrix Testing.
# Users dispatch it with a list of server versions; Matterwick intercepts the
# workflow_run:requested event, provisions one Mattermost Cloud instance per version,
# builds the CMT_MATRIX JSON, and dispatches compatibility-matrix-testing.yml.
# Cleanup happens automatically when compatibility-matrix-testing.yml finishes.
on:
  workflow_dispatch:
    inputs:
      server_versions:
        description: "Comma-separated server versions to test against (max 5, e.g. v11.1.0,v11.2.0)"
        required: true
        type: string

jobs:
  signal:
    runs-on: ubuntu-22.04
    env:
      SERVER_VERSIONS: ${{ inputs.server_versions }}
    steps:
      - name: Record CMT provisioning request
        run: |
          echo "CMT provisioning requested for mobile"
          echo "Server versions: $SERVER_VERSIONS"
          echo "Matterwick will provision instances and dispatch compatibility-matrix-testing.yml"
