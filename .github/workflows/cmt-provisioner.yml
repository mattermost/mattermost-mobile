name: CMT Provisioner

# Lightweight trigger workflow for Compatibility Matrix Testing (CMT).
#
# Matterwick listens for this workflow's workflow_run:requested event, then provisions one
# Mattermost cloud instance per version in its hardcoded CMT version set (Matterwick's
# CMTServerVersions config / CMTVersions, e.g. the active ESR plus the current feature
# release) and dispatches compatibility-matrix-testing.yml with the CMT_MATRIX input.
# When compatibility-matrix-testing.yml completes, Matterwick destroys the provisioned
# instances (cleanup is keyed off the completed workflow_run, matched by commit SHA).
#
# The server-version set lives in Matterwick config (managed via gitops), so this workflow
# takes no inputs. Run it manually from the Actions tab, or let it fire automatically when a
# release branch is cut (below).
#
# Mobile runs CMT only on the release branch *cut* (not on subsequent pushes — that wiring is a
# later change). `create` is the only creation-specific GitHub trigger and cannot be filtered by
# ref name here, so it fires for every branch/tag creation; the job `if` below skips non-release
# creations, and Matterwick is the authoritative gate (it only provisions when head_branch is a
# release-v* branch or the run was a manual workflow_dispatch).
#
# NOTE (intentional duplicate coverage): a release-v* cut/push also triggers Matterwick's normal
# release E2E flow (whole suite against the single latest server). CMT mobile additionally runs
# the SMOKE suite against its multi-version matrix (one runner per version, iOS + Android), whose
# set includes the latest server — so the latest server gets smoke-tested by CMT in addition to
# the normal release suite. This is expected and accepted.

on:
  # Release branch cut only (creation). Subsequent pushes do not re-run CMT for mobile.
  create:
  # Manual runs from the Actions tab.
  workflow_dispatch: {}

# This workflow does not use GITHUB_TOKEN. Its only purpose is to emit a workflow_run event
# that Matterwick reacts to; it does not check out the repo or call the GitHub API. Drop all
# GITHUB_TOKEN scopes so the runner-issued token cannot modify the repo if a step is added later.
permissions: {}

jobs:
  signal:
    # `create` fires for every branch and tag; only act on release-v* branch creations (manual
    # dispatch always runs). This skips the runner for unrelated creations; note that the
    # workflow_run webhook still reaches Matterwick, which independently gates on the branch.
    if: github.event_name == 'workflow_dispatch' || (github.event.ref_type == 'branch' && startsWith(github.event.ref, 'release-v'))
    runs-on: ubuntu-22.04
    steps:
      - name: Signal Matterwick to provision CMT servers
        run: |
          echo "CMT trigger started."
          echo "Matterwick provisions one server per configured version and then"
          echo "dispatches compatibility-matrix-testing.yml automatically."
