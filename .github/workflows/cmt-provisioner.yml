name: CMT Provisioner

# Lightweight trigger workflow for Compatibility Matrix Testing (CMT).
#
# Matterwick listens for this workflow's workflow_run:requested event, then provisions one
# Mattermost cloud instance per version in its CMT version set (auto-derived from Mattermost
# releases, with `CMTServerVersions` in matterwick config as a manual override) and dispatches
# compatibility-matrix-testing.yml with the CMT_MATRIX input. When that test workflow completes,
# Matterwick destroys the provisioned instances (cleanup is keyed off the completed workflow_run,
# matched by commit SHA).
#
# Triggers:
#   - RC tag cut (desktop convention, e.g. `v6.2.0-rc.1`): the `v*-rc*` tag glob. Kept on
#     mobile too as a future-proof no-op — mobile currently doesn't cut RC tags, but if that
#     ever changes the trigger works without any further edits.
#   - Mobile release-build branch push (`build-release-NNN`, 3+ digit build number, e.g.
#     `build-release-786`, `build-release-1100`). The "Mattermost Mobile Release" external
#     workflow creates this branch when a release build is dispatched to TestFlight / Play
#     Store, so it's the natural "RC cut" event on mobile. Platform-specific variants like
#     `build-release-ios-NNN` / `-sim-NNN` / `-android-NNN` are intentionally excluded by the
#     leading-digit glob (and re-checked by matterwick's strict regex).
#   - Manual run from the Actions tab (`workflow_dispatch`, any ref).
#
# Matterwick is the authoritative gate: its `shouldTriggerCMT` requires the head_branch to be
# a manual dispatch, an RC tag, a release branch (`release-*`), or a build-release branch
# matching `^build-release-\d{3,}$`. Anything that slips past the GitHub-side globs is still
# rejected there.
#
# NOTE (intentional duplicate coverage): the matching `release-*` branch on which the RC tag /
# build-release branch is cut also gets a normal release E2E run (whole suite, latest server)
# on push events. CMT runs the SMOKE suite across the multi-version matrix at the RC moment,
# whose set includes the latest server — so the latest server is exercised by both flows.
# Expected and accepted.

on:
  push:
    # Desktop RC tag cut (`vX.Y.Z-rc.N`); no-op on mobile today.
    tags:
      - "v*-rc*"
    # Mobile release-build branch (3+ digit build number). The leading [0-9][0-9][0-9]
    # excludes platform-specific variants like `build-release-ios-NNN`.
    branches:
      - "build-release-[0-9][0-9][0-9]*"
  # Manual runs from the Actions tab (any ref).
  workflow_dispatch: {}

# This workflow does not use GITHUB_TOKEN. Its only purpose is to emit a workflow_run event
# that Matterwick reacts to; it does not check out the repo or call the GitHub API. Drop all
# GITHUB_TOKEN scopes so the runner-issued token cannot modify the repo if a step is added later.
permissions: {}

jobs:
  signal:
    runs-on: ubuntu-22.04
    steps:
      - name: Signal Matterwick to provision CMT servers
        run: |
          echo "CMT trigger started for ref: ${GITHUB_REF}"
          echo "Matterwick provisions one server per configured version and then"
          echo "dispatches compatibility-matrix-testing.yml automatically."
