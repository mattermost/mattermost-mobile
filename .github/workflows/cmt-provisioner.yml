name: CMT Provisioner

# Lightweight trigger workflow for Compatibility Matrix Testing (CMT).
#
# Matterwick listens for this workflow's workflow_run:requested event, then provisions one
# Mattermost cloud instance per version in its CMT version set (auto-derived from Mattermost
# releases, with `CMTServerVersions` in matterwick config as a manual override) and dispatches
# compatibility-matrix-testing.yml with the CMT_MATRIX input. When that test workflow completes,
# Matterwick destroys the provisioned instances (cleanup is keyed off the completed workflow_run,
# matched by commit SHA).
#
# Triggers: an RC tag cut (e.g. `v2.41.0-rc.1`), or a manual run from the Actions tab. The tag
# glob filters out GA tags (`v2.41.0`) and any non-RC pre-release tags. Matterwick is the
# authoritative gate: its `shouldTriggerCMT` also requires the head_branch to be either a manual
# dispatch or an RC tag / release branch, so an off-pattern tag that somehow slips past the glob
# is still rejected.
#
# NOTE (intentional duplicate coverage): the matching `release-*` branch on which the RC tag is
# cut also gets a normal release E2E run (whole suite, latest server) on push events. CMT runs
# the SMOKE suite across the multi-version matrix at the RC moment, whose set includes the latest
# server — so the latest server is exercised by both flows. Expected and accepted.

on:
  # RC tag cut. The glob matches the desktop/mobile RC tag convention `vX.Y.Z-rc.N` and excludes
  # GA tags / nightly tags. (Tag globs are fnmatch-style; matterwick re-validates with a strict
  # regex.)
  push:
    tags:
      - "v*-rc*"
  # Manual runs from the Actions tab (any ref).
  workflow_dispatch: {}

# This workflow does not use GITHUB_TOKEN. Its only purpose is to emit a workflow_run event
# that Matterwick reacts to; it does not check out the repo or call the GitHub API. Drop all
# GITHUB_TOKEN scopes so the runner-issued token cannot modify the repo if a step is added later.
permissions: {}

jobs:
  signal:
    runs-on: ubuntu-22.04
    steps:
      - name: Signal Matterwick to provision CMT servers
        run: |
          echo "CMT trigger started for ref: ${GITHUB_REF}"
          echo "Matterwick provisions one server per configured version and then"
          echo "dispatches compatibility-matrix-testing.yml automatically."
