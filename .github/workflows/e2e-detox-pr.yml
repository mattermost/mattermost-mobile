# Can be used to run Detox E2E tests on pull requests for the Mattermost mobile app with low bandwidth
# by using 'E2E iOS tests for PR (LBW 1)' instead.
name: E2E

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number }}-${{ github.event.label.name || 'smoke' }}"
  cancel-in-progress: true

env:
  INTUNE_ENABLED: 'true'

jobs:
  update-initial-status-ios:
    if: contains(github.event.label.name, 'E2E iOS tests for PR')
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        if: contains(github.event.label.name, 'E2E iOS tests for PR')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-ios-tests
          description: Detox iOS tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-android:
    runs-on: ubuntu-22.04
    if: contains(github.event.label.name, 'E2E Android tests for PR')
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-android-tests
          description: Detox Android tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-ios-smoke:
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E iOS smoke tests for PR')
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-ios-smoke-tests
          description: Detox iOS smoke tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-android-smoke:
    runs-on: ubuntu-22.04
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E Android smoke tests for PR')
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-android-smoke-tests
          description: Detox Android smoke tests for mattermost mobile app have started ...
          status: pending

  build-ios-simulator-smoke:
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E iOS smoke tests for PR')
    runs-on: macos-26
    needs:
      - update-initial-status-ios-smoke
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute iOS build cache key
        id: ios-cache-key
        run: echo "hash=${{ hashFiles('ios/**', 'libraries/**', 'package-lock.json', 'patches/**') }}" >> $GITHUB_OUTPUT

      - name: Restore iOS simulator build cache
        id: ios-build-cache
        uses: actions/cache/restore@v4
        with:
          path: Mattermost-simulator-arm64.app.zip
          key: ios-sim-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Restore Xcode build intermediates
        id: xcode-intermediates-cache
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            ios/Build/Products
            !ios/Build/Products/Release-iphonesimulator/Mattermost.app
          key: ios-intermediates-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}
          restore-keys: |
            ios-intermediates-${{ runner.os }}-${{ runner.arch }}-

      - name: Prepare iOS Build
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: ${{ env.INTUNE_ENABLED }}
          intune-ssh-private-key: ${{ secrets.MM_MOBILE_INTUNE_DEPLOY_KEY }}

      - name: Set .env with RUNNING_E2E=true
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        run: |
          echo "RUNNING_E2E=true" > .env

      - name: Build iOS Simulator
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        env:
          TAG: "${{ github.event.pull_request.head.sha }}"
          GITHUB_TOKEN: "${{ secrets.MM_MOBILE_GITHUB_TOKEN }}"
        run: bundle exec fastlane ios simulator --env ios.simulator skip_upload_to_s3_bucket:true
        working-directory: ./fastlane

      - name: Save iOS simulator build cache
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Mattermost-simulator-arm64.app.zip
          key: ios-sim-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Save Xcode build intermediates
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ios/Build/Products
            !ios/Build/Products/Release-iphonesimulator/Mattermost.app
          key: ios-intermediates-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-*.app.zip

  build-android-apk-smoke:
    runs-on: ubuntu-latest-8-cores
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E Android smoke tests for PR')
    needs:
      - update-initial-status-android-smoke
    env:
      ORG_GRADLE_PROJECT_jvmargs: -Xmx8g
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute Android build cache key
        id: android-cache-key
        run: echo "hash=${{ hashFiles('android/**', 'libraries/**', 'package-lock.json', 'patches/**') }}" >> $GITHUB_OUTPUT

      - name: Restore Android APK build cache
        id: android-build-cache
        uses: actions/cache/restore@v4
        with:
          path: android/app/build/outputs/apk/
          key: android-apk-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}

      - name: Prune Docker to free up space
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: docker system prune -af

      - name: Remove npm Temporary Files
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf ~/.npm/_cacache

      - name: Prepare Android Build
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: "${{ secrets.MM_MOBILE_STORE_FILE }}"
          STORE_ALIAS: "${{ secrets.MM_MOBILE_STORE_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.MM_MOBILE_STORE_PASSWORD }}"
          MATTERMOST_BUILD_GH_TOKEN: "${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}"

      - name: Install Dependencies
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: sudo apt-get clean && sudo apt-get update && sudo apt-get install -y default-jdk

      - name: Cache Gradle dependencies
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2/
            ~/.gradle/caches/jars-*/
            ~/.gradle/caches/transforms-*/
            ~/.gradle/wrapper/dists/
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Restore Gradle build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/build-cache
          key: android-gradle-build-cache-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}
          restore-keys: |
            android-gradle-build-cache-${{ runner.os }}-

      - name: Cache Detox node_modules
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: detox/node_modules
          key: ${{ runner.os }}-detox-npm-${{ hashFiles('detox/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-detox-npm-

      - name: Detox build
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        env:
          ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
        run: |
          cd detox
          npm install
          npm install -g detox-cli
          npm run e2e:android-inject-settings
          npm run e2e:android-build

      - name: Save Android APK build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: android/app/build/outputs/apk/
          key: android-apk-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}

      - name: Save Gradle build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.gradle/build-cache
          key: android-gradle-build-cache-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}

      - name: Upload Android Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-files-${{ github.run_id }}
          path: "android/app/build/outputs/apk/"

  build-ios-simulator:
    if: contains(github.event.label.name, 'E2E iOS tests for PR')
    runs-on: macos-26
    needs:
      - update-initial-status-ios
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute iOS build cache key
        id: ios-cache-key
        run: echo "hash=${{ hashFiles('ios/**', 'libraries/**', 'package-lock.json', 'patches/**') }}" >> $GITHUB_OUTPUT

      - name: Restore iOS simulator build cache
        id: ios-build-cache
        uses: actions/cache/restore@v4
        with:
          path: Mattermost-simulator-arm64.app.zip
          key: ios-sim-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Restore Xcode build intermediates
        id: xcode-intermediates-cache
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            ios/Build/Products
            !ios/Build/Products/Release-iphonesimulator/Mattermost.app
          key: ios-intermediates-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}
          restore-keys: |
            ios-intermediates-${{ runner.os }}-${{ runner.arch }}-

      - name: Prepare iOS Build
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: ${{ env.INTUNE_ENABLED }}
          intune-ssh-private-key: ${{ secrets.MM_MOBILE_INTUNE_DEPLOY_KEY }}

      - name: Set .env with RUNNING_E2E=true
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        run: |
          echo "RUNNING_E2E=true" > .env

      - name: Build iOS Simulator
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        env:
          TAG: "${{ github.event.pull_request.head.sha }}"
          GITHUB_TOKEN: "${{ secrets.MM_MOBILE_GITHUB_TOKEN }}"
        run: bundle exec fastlane ios simulator --env ios.simulator skip_upload_to_s3_bucket:true
        working-directory: ./fastlane

      - name: Save iOS simulator build cache
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Mattermost-simulator-arm64.app.zip
          key: ios-sim-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Save Xcode build intermediates
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ios/Build/Products
            !ios/Build/Products/Release-iphonesimulator/Mattermost.app
          key: ios-intermediates-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-*.app.zip

  build-android-apk:
    runs-on: ubuntu-latest-8-cores
    if: contains(github.event.label.name, 'E2E Android tests for PR')
    needs:
      - update-initial-status-android
    env:
      ORG_GRADLE_PROJECT_jvmargs: -Xmx8g
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute Android build cache key
        id: android-cache-key
        run: echo "hash=${{ hashFiles('android/**', 'libraries/**', 'package-lock.json', 'patches/**') }}" >> $GITHUB_OUTPUT

      - name: Restore Android APK build cache
        id: android-build-cache
        uses: actions/cache/restore@v4
        with:
          path: android/app/build/outputs/apk/
          key: android-apk-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}

      - name: Prune Docker to free up space
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: docker system prune -af

      - name: Remove npm Temporary Files
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf ~/.npm/_cacache

      - name: Prepare Android Build
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: "${{ secrets.MM_MOBILE_STORE_FILE }}"
          STORE_ALIAS: "${{ secrets.MM_MOBILE_STORE_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.MM_MOBILE_STORE_PASSWORD }}"
          MATTERMOST_BUILD_GH_TOKEN: "${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}"

      - name: Install Dependencies
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: sudo apt-get clean && sudo apt-get update && sudo apt-get install -y default-jdk

      - name: Cache Gradle dependencies
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2/
            ~/.gradle/caches/jars-*/
            ~/.gradle/caches/transforms-*/
            ~/.gradle/wrapper/dists/
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Restore Gradle build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/build-cache
          key: android-gradle-build-cache-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}
          restore-keys: |
            android-gradle-build-cache-${{ runner.os }}-

      - name: Cache Detox node_modules
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: detox/node_modules
          key: ${{ runner.os }}-detox-npm-${{ hashFiles('detox/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-detox-npm-

      - name: Detox build
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        env:
          ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
        run: |
          cd detox
          npm install
          npm install -g detox-cli
          npm run e2e:android-inject-settings
          npm run e2e:android-build

      - name: Save Android APK build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: android/app/build/outputs/apk/
          key: android-apk-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}

      - name: Save Gradle build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.gradle/build-cache
          key: android-gradle-build-cache-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}

      - name: Upload Android Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-files-${{ github.run_id }}
          path: "android/app/build/outputs/apk/"

  run-ios-tests-on-pr:
    if: contains(github.event.label.name, 'E2E iOS tests for PR')
    name: iOS
    uses: ./.github/workflows/e2e-ios-template.yml
    needs:
      - build-ios-simulator
    with:
      run-type: "PR"
      MOBILE_VERSION: ${{ github.event.pull_request.head.sha }}
      low_bandwidth_mode: ${{ contains(github.event.label.name,'LBW') && true || false }}
    secrets: inherit

  run-ios-smoke-tests-on-pr:
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E iOS smoke tests for PR')
    name: iOS Smoke
    uses: ./.github/workflows/e2e-ios-template.yml
    needs:
      - build-ios-simulator-smoke
    with:
      run-type: "PR"
      MOBILE_VERSION: ${{ github.event.pull_request.head.sha }}
      search_path: "detox/e2e/test/products/channels/smoke_test"
      parallelism: 1
    secrets: inherit

  run-android-tests-on-pr:
    if: contains(github.event.label.name, 'E2E Android tests for PR')
    name: Android
    uses: ./.github/workflows/e2e-android-template.yml
    needs:
      - build-android-apk
    with:
      run-android-tests: true
      run-type: "PR"
      MOBILE_VERSION: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  run-android-smoke-tests-on-pr:
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E Android smoke tests for PR')
    name: Android Smoke
    uses: ./.github/workflows/e2e-android-template.yml
    needs:
      - build-android-apk-smoke
    with:
      run-android-tests: true
      run-type: "PR"
      MOBILE_VERSION: ${{ github.event.pull_request.head.sha }}
      search_path: "detox/e2e/test/products/channels/smoke_test"
      parallelism: 1
    secrets: inherit

  update-final-status-ios:
    runs-on: ubuntu-22.04
    if: contains(github.event.label.name, 'E2E iOS tests for PR')
    needs:
      - run-ios-tests-on-pr
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-ios-tests
          description: Completed with ${{ needs.run-ios-tests-on-pr.outputs.FAILURES }} failures
          status: ${{ needs.run-ios-tests-on-pr.outputs.STATUS }}
          target_url: ${{ needs.run-ios-tests-on-pr.outputs.TARGET_URL }}

  update-final-status-android:
    runs-on: ubuntu-22.04
    if: contains(github.event.label.name, 'E2E Android tests for PR')
    needs:
      - run-android-tests-on-pr
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-android-tests
          description: Completed with ${{ needs.run-android-tests-on-pr.outputs.FAILURES }} failures
          status: ${{ needs.run-android-tests-on-pr.outputs.STATUS }}
          target_url: ${{ needs.run-android-tests-on-pr.outputs.TARGET_URL }}

  update-final-status-ios-smoke:
    runs-on: ubuntu-22.04
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E iOS smoke tests for PR')
    needs:
      - run-ios-smoke-tests-on-pr
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-ios-smoke-tests
          description: Completed with ${{ needs.run-ios-smoke-tests-on-pr.outputs.FAILURES }} failures
          status: ${{ needs.run-ios-smoke-tests-on-pr.outputs.STATUS }}
          target_url: ${{ needs.run-ios-smoke-tests-on-pr.outputs.TARGET_URL }}

  update-final-status-android-smoke:
    runs-on: ubuntu-22.04
    if: github.event.action != 'labeled' || contains(github.event.label.name, 'E2E Android smoke tests for PR')
    needs:
      - run-android-smoke-tests-on-pr
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.event.pull_request.head.sha }}
          context: e2e/detox-android-smoke-tests
          description: Completed with ${{ needs.run-android-smoke-tests-on-pr.outputs.FAILURES }} failures
          status: ${{ needs.run-android-smoke-tests-on-pr.outputs.STATUS }}
          target_url: ${{ needs.run-android-smoke-tests-on-pr.outputs.TARGET_URL }}

  e2e-remove-ios-label:
    runs-on: ubuntu-22.04
    needs:
      - run-ios-tests-on-pr
    steps:
      - name: e2e/remove-label-from-pr
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        continue-on-error: true # Label might have been removed manually
        with:
          script: |
            const iosLabel = 'E2E iOS tests for PR';
            context.payload.pull_request.labels.forEach(label => {
              if (label.name.includes(iosLabel)) {
                github.rest.issues.removeLabel({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              }
            });

  e2e-remove-android-label:
    runs-on: ubuntu-22.04
    needs:
      - run-android-tests-on-pr
    steps:
      - name: e2e/remove-label-from-pr
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        continue-on-error: true # Label might have been removed manually
        with:
          script: |
            const androidLabel = 'E2E Android tests for PR';
            context.payload.pull_request.labels.forEach(label => {
              if (label.name.includes(androidLabel)) {
                github.rest.issues.removeLabel({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              }
            });

  e2e-remove-ios-smoke-label:
    runs-on: ubuntu-22.04
    if: contains(github.event.label.name, 'E2E iOS smoke tests for PR')
    needs:
      - run-ios-smoke-tests-on-pr
    steps:
      - name: e2e/remove-label-from-pr
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        continue-on-error: true # Label might have been removed manually
        with:
          script: |
            const iosSmokeLabel = 'E2E iOS smoke tests for PR';
            context.payload.pull_request.labels.forEach(label => {
              if (label.name.includes(iosSmokeLabel)) {
                github.rest.issues.removeLabel({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              }
            });

