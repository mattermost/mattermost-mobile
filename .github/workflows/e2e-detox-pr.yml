# E2E tests are triggered exclusively by Matterwick via workflow_dispatch.
# Matterwick provisions dedicated cloud servers and passes their URLs here.
# No static/permanent server fallback is used — if Matterwick doesn't dispatch
# this workflow, no E2E tests run.
name: E2E

on:
  workflow_dispatch:
    inputs:
      MOBILE_VERSION:
        description: "The mobile app commit SHA to test"
        required: true
        type: string
      PLATFORM:
        description: "Mobile platform to test: ios, android, or both"
        required: false
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both
      SITE_1_URL:
        description: "URL of the first Mattermost test server (provisioned by Matterwick)"
        required: true
        type: string
      SITE_2_URL:
        description: "URL of the second Mattermost test server (provisioned by Matterwick)"
        required: false
        type: string
      SITE_3_URL:
        description: "URL of the third Mattermost test server (provisioned by Matterwick)"
        required: false
        type: string
      pr_number:
        description: "PR number to remove E2E label from after tests complete"
        required: false
        type: string
      run_type:
        description: "Run type for test reporting (PR/RELEASE/NIGHTLY/MASTER). Defaults to PR."
        required: false
        default: "PR"
        type: string

concurrency:
  # Key on pr_number (or run_id for non-PR runs like nightly/push) so
  # simultaneous dispatches for different PRs don't cancel each other.
  group: "${{ github.workflow }}-${{ inputs.pr_number || github.run_id }}"
  cancel-in-progress: true

env:
  INTUNE_ENABLED: 'false'
  DETOX_AWS_S3_BUCKET: "mattermost-detox-report"

jobs:
  update-initial-status-ios:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ios-tests
          description: Detox iOS tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-android:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-android-tests
          description: Detox Android tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-ipad:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ipad-tests
          description: Detox iPad tests for mattermost mobile app have started ...
          status: pending

  # Set initial pending status for the maestro checks so they appear on the PR
  # immediately when the workflow starts, mirroring the detox pattern above.
  # Without these, the e2e/maestro-{ios,android}-tests contexts only show up
  # after the maestro run completes (or not at all if it's still running).
  update-initial-status-maestro-ios:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-ios-tests
          description: Maestro iOS tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-maestro-android:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-android-tests
          description: Maestro Android tests for mattermost mobile app have started ...
          status: pending

  build-ios-simulator:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: macos-26
    needs:
      - update-initial-status-ios
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Prepare iOS Build
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: ${{ env.INTUNE_ENABLED }}
          intune-ssh-private-key: ${{ secrets.MM_MOBILE_INTUNE_DEPLOY_KEY }}

      - name: Set .env with RUNNING_E2E=true
        run: echo "RUNNING_E2E=true" > .env

      - name: Build iOS Simulator
        env:
          TAG: ${{ inputs.MOBILE_VERSION }}
          GITHUB_TOKEN: ${{ secrets.MM_MOBILE_GITHUB_TOKEN }}
        run: bundle exec fastlane ios simulator --env ios.simulator
        working-directory: ./fastlane

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-*.app.zip

  build-android-apk:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-latest-8-cores
    needs:
      - update-initial-status-android
    env:
      ORG_GRADLE_PROJECT_jvmargs: -Xmx8g
    steps:
      - name: Prune Docker to free up space
        run: docker system prune -af

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Prepare Android Build
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: ${{ secrets.MM_MOBILE_STORE_FILE }}
          STORE_ALIAS: ${{ secrets.MM_MOBILE_STORE_ALIAS }}
          STORE_PASSWORD: ${{ secrets.MM_MOBILE_STORE_PASSWORD }}
          MATTERMOST_BUILD_GH_TOKEN: ${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}

      # Cache Gradle dependencies — same key as e2e-detox-release.yml so the
      # PR + release workflows share cache. Saves 3-5 min on warm runs by
      # skipping gradle plugin resolution + Maven dep downloads.
      - name: Cache Gradle dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.gradle/caches/modules-2/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Detox build
        run: |
          cd detox
          npm ci --prefer-offline --no-audit --no-fund
          npm install -g detox-cli
          npm run e2e:android-build

      - name: Upload Android Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-files-${{ github.run_id }}
          path: "android/app/build/**/*"

  provision-servers:
    name: Provision test servers
    runs-on: ubuntu-22.04
    steps:
      - name: Validate server URLs
        run: |
          validate_url() {
            local url="$1" label="$2"
            if [ -z "$url" ]; then return 0; fi

            # Reject any whitespace (space, tab, newline). Without this, an input
            # like "https://valid.cloud  https://evil.example.com" would pass the
            # rest of the validators (urlparse only inspects up to the first
            # space) but then get word-split into two URLs by an unquoted shell
            # iteration downstream — letting the second, unvalidated URL reach
            # the provisioning sink. Whitespace is never legal in a URL anyway.
            if [[ "$url" =~ [[:space:]] ]]; then
              echo "::error::$label contains whitespace: $url"
              exit 1
            fi

            # Must be HTTPS
            if [[ ! "$url" =~ ^https:// ]]; then
              echo "::error::$label must use HTTPS: $url"
              exit 1
            fi

            # Extract hostname safely using Python URL parser to prevent SSRF bypass via userinfo.
            # CRITICAL: the URL is passed as argv[1], NOT interpolated into the Python source.
            # The Python code is single-quoted so bash performs no expansion inside it; "$url"
            # is a separate argv argument, treated as a literal string by Python. This prevents
            # injection of Python syntax (e.g. https://a.com')+__import__('os').system(...)+(' )
            # that would escape the urlparse() call if the URL were interpolated.
            hostname=$(python3 -c 'import sys; from urllib.parse import urlparse; print(urlparse(sys.argv[1]).hostname or "")' "$url" | tr '[:upper:]' '[:lower:]')

            # Block private/internal IPs
            if echo "$hostname" | grep -qE '^(127\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|0\.|localhost)'; then
              echo "::error::$label points to a private/internal address: $hostname"
              exit 1
            fi

            # Allowlist: only Mattermost-operated domains
            if ! echo "$hostname" | grep -qE '\.(cloud\.mattermost\.com|test\.mattermost\.cloud|mattermost\.com|mattermost\.cloud)$'; then
              echo "::error::$label domain not in allowlist: $hostname"
              exit 1
            fi

            echo "✓ $label validated: $hostname"
          }

          validate_url "$SITE_1_URL" "SITE_1_URL"
          validate_url "$SITE_2_URL" "SITE_2_URL"
          validate_url "$SITE_3_URL" "SITE_3_URL"
        env:
          SITE_1_URL: ${{ inputs.SITE_1_URL }}
          SITE_2_URL: ${{ inputs.SITE_2_URL }}
          SITE_3_URL: ${{ inputs.SITE_3_URL }}

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Provision servers (license + plugins)
        run: |
          # Quote every variable in the iteration. Without quotes, bash word-splits
          # on whitespace and would treat e.g. "https://a https://b" as two URLs,
          # bypassing the per-variable validation in the previous step (which
          # validates the value as a single string). The validator above also
          # rejects whitespace outright, so this is belt-and-suspenders.
          for url in "$SITE_1_URL" "$SITE_2_URL" "$SITE_3_URL"; do
            if [ -n "$url" ]; then
              echo "--- Provisioning $url ---"
              node detox/provision_server.js "$url" || echo "Warning: provisioning $url failed (non-fatal)"
            fi
          done
        env:
          SITE_1_URL: ${{ inputs.SITE_1_URL }}
          SITE_2_URL: ${{ inputs.SITE_2_URL }}
          SITE_3_URL: ${{ inputs.SITE_3_URL }}
          ADMIN_USERNAME: ${{ secrets.MM_MOBILE_E2E_ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.MM_MOBILE_E2E_ADMIN_PASSWORD }}

  run-ios-tests:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    name: iOS
    needs:
      - build-ios-simulator
      - provision-servers
    uses: ./.github/workflows/e2e-ios-template.yml
    with:
      run-type: ${{ inputs.run_type || 'PR' }}
      record_tests_in_zephyr: ${{ (inputs.run_type == 'RELEASE' || inputs.run_type == 'NIGHTLY' || inputs.run_type == 'MASTER') && 'true' || 'false' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_1_URL }}
      MM_TEST_SERVER_URL_2: ${{ inputs.SITE_2_URL }}
      MM_TEST_SERVER_URL_3: ${{ inputs.SITE_3_URL }}
    secrets: inherit

  run-android-tests:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    name: Android
    needs:
      - build-android-apk
      - provision-servers
    uses: ./.github/workflows/e2e-android-template.yml
    with:
      run-android-tests: true
      run-type: ${{ inputs.run_type || 'PR' }}
      record_tests_in_zephyr: ${{ (inputs.run_type == 'RELEASE' || inputs.run_type == 'NIGHTLY' || inputs.run_type == 'MASTER') && 'true' || 'false' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_1_URL }}
      MM_TEST_SERVER_URL_2: ${{ inputs.SITE_2_URL }}
      MM_TEST_SERVER_URL_3: ${{ inputs.SITE_3_URL }}
    secrets: inherit

  update-final-status-ios:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both')
    needs:
      - run-ios-tests
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ios-tests
          # Description rules (order matters — GHA `'' == '0'` is TRUTHY because
          # both sides are coerced to numeric 0):
          #   1. Upstream job skipped (build failed)  → explicit "Build failed"
          #   2. All test machines failed             → catastrophic message
          #   3. 0 failures & some skipped            → "P passed, M skipped"
          #   4. 0 failures & 0 skipped               → "All N tests passed"
          #   5. Any failures                         → "P passed, F failed, M skipped"
          # `> '0'` does numeric comparison: '' > '0' is FALSE (both → 0),
          # so an empty SKIPPED safely renders the no-skipped branch.
          description: >-
            ${{ needs.run-ios-tests.result == 'skipped' && 'Build failed — iOS detox tests did not run'
              || needs.run-ios-tests.outputs.FAILURES == '-1' && 'All test machines failed before producing results'
              || (needs.run-ios-tests.outputs.FAILURES == '0' && needs.run-ios-tests.outputs.SKIPPED > '0') && format('{0} passed, {1} skipped', needs.run-ios-tests.outputs.PASSES, needs.run-ios-tests.outputs.SKIPPED)
              || needs.run-ios-tests.outputs.FAILURES == '0' && format('All {0} tests passed', needs.run-ios-tests.outputs.TOTAL)
              || format('{0} passed, {1} failed, {2} skipped', needs.run-ios-tests.outputs.PASSES || '?', needs.run-ios-tests.outputs.FAILURES || '?', needs.run-ios-tests.outputs.SKIPPED || '0') }}
          status: ${{ (needs.run-ios-tests.result == 'skipped' && 'failure') || needs.run-ios-tests.outputs.STATUS || 'failure' }}
          target_url: ${{ needs.run-ios-tests.outputs.TARGET_URL }}

  update-final-status-android:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both')
    needs:
      - run-android-tests
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-android-tests
          # See ios block above for full rule list.
          description: >-
            ${{ needs.run-android-tests.result == 'skipped' && 'Build failed — Android detox tests did not run'
              || needs.run-android-tests.outputs.FAILURES == '-1' && 'All test machines failed before producing results'
              || (needs.run-android-tests.outputs.FAILURES == '0' && needs.run-android-tests.outputs.SKIPPED > '0') && format('{0} passed, {1} skipped', needs.run-android-tests.outputs.PASSES, needs.run-android-tests.outputs.SKIPPED)
              || needs.run-android-tests.outputs.FAILURES == '0' && format('All {0} tests passed', needs.run-android-tests.outputs.TOTAL)
              || format('{0} passed, {1} failed, {2} skipped', needs.run-android-tests.outputs.PASSES || '?', needs.run-android-tests.outputs.FAILURES || '?', needs.run-android-tests.outputs.SKIPPED || '0') }}
          status: ${{ (needs.run-android-tests.result == 'skipped' && 'failure') || needs.run-android-tests.outputs.STATUS || 'failure' }}
          target_url: ${{ needs.run-android-tests.outputs.TARGET_URL }}

  run-ios-ipad-tests:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    name: iOS iPad
    needs:
      - build-ios-simulator
      - update-initial-status-ipad
      - provision-servers
    uses: ./.github/workflows/e2e-ios-template.yml
    with:
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_2_URL }}
      ios_device_name: "iPad Pro 13-inch (M5)"
      ios_device_os_name: "iOS 26.2"
      search_path: "detox/e2e/test/products/channels/ipad"
      parallelism: "1"
      detox_config: "ios.ipad.debug"
    secrets: inherit

  update-final-status-ipad:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both')
    needs:
      - run-ios-ipad-tests
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ipad-tests
          # See ios block above for full rule list.
          description: >-
            ${{ needs.run-ios-ipad-tests.result == 'skipped' && 'Build failed — iPad detox tests did not run'
              || needs.run-ios-ipad-tests.outputs.FAILURES == '-1' && 'All test machines failed before producing results'
              || (needs.run-ios-ipad-tests.outputs.FAILURES == '0' && needs.run-ios-ipad-tests.outputs.SKIPPED > '0') && format('{0} passed, {1} skipped', needs.run-ios-ipad-tests.outputs.PASSES, needs.run-ios-ipad-tests.outputs.SKIPPED)
              || needs.run-ios-ipad-tests.outputs.FAILURES == '0' && format('All {0} tests passed', needs.run-ios-ipad-tests.outputs.TOTAL)
              || format('{0} passed, {1} failed, {2} skipped', needs.run-ios-ipad-tests.outputs.PASSES || '?', needs.run-ios-ipad-tests.outputs.FAILURES || '?', needs.run-ios-ipad-tests.outputs.SKIPPED || '0') }}
          status: ${{ (needs.run-ios-ipad-tests.result == 'skipped' && 'failure') || needs.run-ios-ipad-tests.outputs.STATUS || 'failure' }}
          target_url: ${{ needs.run-ios-ipad-tests.outputs.TARGET_URL }}

  run-maestro-ios:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    name: Maestro iOS
    needs:
      - update-initial-status-maestro-ios
      - build-ios-simulator
      - provision-servers
    uses: ./.github/workflows/e2e-maestro-template.yml
    with:
      platform: ios
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_2_URL }}
    secrets: inherit

  run-maestro-android:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    name: Maestro Android
    # NOTE: We deliberately do NOT depend on build-android-apk. The detox APK is
    # an `assembleDebug` build that skips JS bundling and expects a Metro dev
    # server at runtime (detox starts Metro itself, maestro does not). Maestro
    # builds its own JS-bundled APK via `assembleRelease` inside its own job —
    # see e2e-maestro-template.yml. This also lets maestro android start as
    # soon as provision-servers finishes instead of waiting on the detox build.
    needs:
      - update-initial-status-maestro-android
      - provision-servers
    uses: ./.github/workflows/e2e-maestro-template.yml
    with:
      platform: android
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_3_URL }}
    secrets: inherit

  update-final-status-maestro-ios:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both')
    needs:
      - run-maestro-ios
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-ios-tests
          # See ios block above for full rule list.
          description: >-
            ${{ needs.run-maestro-ios.result == 'skipped' && 'Build failed — Maestro iOS tests did not run'
              || needs.run-maestro-ios.outputs.FAILURES == '-1' && 'All test machines failed before producing results'
              || (needs.run-maestro-ios.outputs.FAILURES == '0' && needs.run-maestro-ios.outputs.SKIPPED > '0') && format('{0} passed, {1} skipped', needs.run-maestro-ios.outputs.PASSES, needs.run-maestro-ios.outputs.SKIPPED)
              || needs.run-maestro-ios.outputs.FAILURES == '0' && format('All {0} tests passed', needs.run-maestro-ios.outputs.TOTAL)
              || format('{0} passed, {1} failed, {2} skipped', needs.run-maestro-ios.outputs.PASSES || '?', needs.run-maestro-ios.outputs.FAILURES || '?', needs.run-maestro-ios.outputs.SKIPPED || '0') }}
          status: ${{ (needs.run-maestro-ios.result == 'skipped' && 'failure') || needs.run-maestro-ios.outputs.STATUS || 'failure' }}
          target_url: ${{ needs.run-maestro-ios.outputs.TARGET_URL }}

  update-final-status-maestro-android:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both')
    needs:
      - run-maestro-android
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-android-tests
          # See ios block above for full rule list.
          description: >-
            ${{ needs.run-maestro-android.result == 'skipped' && 'Provisioning failed — Maestro Android tests did not run'
              || needs.run-maestro-android.outputs.FAILURES == '-1' && 'All test machines failed before producing results'
              || (needs.run-maestro-android.outputs.FAILURES == '0' && needs.run-maestro-android.outputs.SKIPPED > '0') && format('{0} passed, {1} skipped', needs.run-maestro-android.outputs.PASSES, needs.run-maestro-android.outputs.SKIPPED)
              || needs.run-maestro-android.outputs.FAILURES == '0' && format('All {0} tests passed', needs.run-maestro-android.outputs.TOTAL)
              || format('{0} passed, {1} failed, {2} skipped', needs.run-maestro-android.outputs.PASSES || '?', needs.run-maestro-android.outputs.FAILURES || '?', needs.run-maestro-android.outputs.SKIPPED || '0') }}
          status: ${{ (needs.run-maestro-android.result == 'skipped' && 'failure') || needs.run-maestro-android.outputs.STATUS || 'failure' }}
          target_url: ${{ needs.run-maestro-android.outputs.TARGET_URL }}

  e2e-remove-matterwick-label:
    name: Remove Matterwick E2E label from PR
    runs-on: ubuntu-22.04
    needs:
      - update-final-status-ios
      - update-final-status-android
      - update-final-status-ipad
      - update-final-status-maestro-ios
      - update-final-status-maestro-android
    # IMPORTANT: !cancelled() prevents label removal when the workflow is cancelled
    # (e.g. by concurrency cancel-in-progress). Without this, Matterwick sees the
    # label removed and deletes the test servers while the replacement run is still
    # using them.
    if: always() && !cancelled()
    steps:
      - name: e2e/remove-label-from-pr
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        continue-on-error: true # Label might have been removed manually
        with:
          script: |
            // Use pr_number input if provided, otherwise look up from branch
            let prNumber = parseInt(process.env.PR_NUMBER);
            if (!prNumber) {
              const branch = process.env.BRANCH;
              if (branch) {
                const {data: prs} = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head: `${context.repo.owner}:${branch}`,
                  state: 'open',
                  per_page: 1,
                });
                if (prs.length > 0) {
                  prNumber = prs[0].number;
                }
              }
            }
            if (!prNumber) {
              console.log('No PR found — skipping label removal');
              return;
            }
            console.log(`Removing E2E labels from PR #${prNumber}`);
            const labels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];
            for (const label of labels) {
              try {
                await github.rest.issues.removeLabel({
                  issue_number: prNumber,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch (_) {
                // Label may not exist on this PR, ignore
              }
            }
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          BRANCH: ${{ github.ref_name }}
