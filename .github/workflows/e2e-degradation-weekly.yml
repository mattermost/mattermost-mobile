# Weekly E2E tests with flapping/intermittent network simulation
# Tests reconnection handling, message queue recovery, and race conditions
# during network state transitions

name: E2E Degradation Tests (Weekly - Flapping)

on:
  schedule:
    # Run at 3 AM UTC every Sunday
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to test'
        required: false
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - both

env:
  MOBILE_VERSION: ${{ github.ref }}

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      run_ios: ${{ steps.parse.outputs.run_ios }}
      run_android: ${{ steps.parse.outputs.run_android }}
    steps:
      - name: Parse platforms
        id: parse
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || 'ios' }}"
          if [ "$PLATFORMS" = "ios" ] || [ "$PLATFORMS" = "both" ]; then
            echo "run_ios=true" >> $GITHUB_OUTPUT
          else
            echo "run_ios=false" >> $GITHUB_OUTPUT
          fi
          if [ "$PLATFORMS" = "android" ] || [ "$PLATFORMS" = "both" ]; then
            echo "run_android=true" >> $GITHUB_OUTPUT
          else
            echo "run_android=false" >> $GITHUB_OUTPUT
          fi

  build-ios-simulator:
    if: ${{ needs.setup.outputs.run_ios == 'true' }}
    runs-on: macos-26
    needs: setup
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare iOS Build
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: 'false'

      - name: Set .env with RUNNING_E2E=true
        run: echo "RUNNING_E2E=true" > .env

      - name: Build iOS Simulator
        env:
          TAG: "${{ github.sha }}"
          GITHUB_TOKEN: "${{ secrets.MM_MOBILE_GITHUB_TOKEN }}"
        run: bundle exec fastlane ios simulator --env ios.simulator skip_upload_to_s3_bucket:true
        working-directory: ./fastlane

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-*.app.zip

  build-android-apk:
    if: ${{ needs.setup.outputs.run_android == 'true' }}
    runs-on: ubuntu-latest-8-cores
    needs: setup
    env:
      ORG_GRADLE_PROJECT_jvmargs: -Xmx8g
    steps:
      - name: Prune Docker to free up space
        run: docker system prune -af

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare Android Build
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: "${{ secrets.MM_MOBILE_STORE_FILE }}"
          STORE_ALIAS: "${{ secrets.MM_MOBILE_STORE_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.MM_MOBILE_STORE_PASSWORD }}"
          MATTERMOST_BUILD_GH_TOKEN: "${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}"

      - name: Install Dependencies
        run: sudo apt-get clean && sudo apt-get update && sudo apt-get install -y default-jdk

      - name: Detox build
        run: |
          cd detox
          npm install
          npm install -g detox-cli
          npm run e2e:android-inject-settings
          npm run e2e:android-build

      - name: Upload Android Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-files-${{ github.run_id }}
          path: "android/app/build/**/*"

  # Flapping tests - intermittent connectivity
  ios-flapping-tests:
    if: ${{ needs.setup.outputs.run_ios == 'true' }}
    needs:
      - setup
      - build-ios-simulator
    name: iOS - flapping (intermittent)
    uses: ./.github/workflows/e2e-ios-template.yml
    with:
      run-type: "Weekly-Flapping"
      MOBILE_VERSION: ${{ github.sha }}
      network_profile: flapping
      record_tests_in_zephyr: 'false'
      testcase_failure_fatal: false
    secrets: inherit

  android-flapping-tests:
    if: ${{ needs.setup.outputs.run_android == 'true' }}
    needs:
      - setup
      - build-android-apk
    name: Android - flapping (intermittent)
    uses: ./.github/workflows/e2e-android-template.yml
    with:
      run-android-tests: true
      run-type: "Weekly-Flapping"
      MOBILE_VERSION: ${{ github.sha }}
      network_profile: flapping
      record_tests_in_zephyr: 'false'
      testcase_failure_fatal: false
    secrets: inherit

  summary:
    runs-on: ubuntu-22.04
    needs:
      - setup
      - ios-flapping-tests
      - android-flapping-tests
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# Weekly Flapping Network Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests run with **flapping** profile (intermittent connectivity simulation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pattern: connected(30s) → disconnected(5s) → slow_3g(30s) → disconnected(3s) → repeat" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| iOS | ${{ needs.ios-flapping-tests.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android | ${{ needs.android-flapping-tests.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
