# Matterwick triggers E2E only on pull_request:labeled (see matterwick/server/pull_request.go).
# synchronize alone does nothing — on push we must cancel stale runs, remove E2E/Run*,
# and re-add E2E/Run so Matterwick receives a fresh labeled webhook.
#
#   1. detect-e2e-impact (opened|synchronize):
#      Path-filter; skip E2E when the PR has no app-impacting files.
#
#   2. cancel-stale-e2e-on-push (synchronize):
#      Force-cancel in-flight E2E for the previous commit (even on docs-only pushes).
#
#   3. refresh-e2e-run-label (synchronize, app-impacting):
#      Remove + re-add E2E/Run via PAT for Matterwick.
#
#   4. add-e2e-run-label (opened, app-impacting):
#      Add E2E/Run unless already present. Skips when E2E/Override is set.
#
#   5. Honor E2E/Override (labeled E2E/Override):
#      Removes all E2E/Run* labels and cancels in-progress E2E workflow runs.
#
# Fork PR guard (github.event.pull_request.head.repo.full_name == github.repository)
# is applied per-step. Fork PR contexts only get a read-only GITHUB_TOKEN, so
# addLabels / removeLabel / gh-run-cancel would all 403. Mandatory E2E for fork
# PRs is enforced separately.
#
# Base-branch guard: auto E2E/Run refresh only runs for PRs targeting main.
# Stacked PRs (base != main) are skipped so Matterwick is not triggered on every
# intermediate-branch push.
#
name: E2E label manager

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled
      - unlabeled

concurrency:
  group: e2e-label-manager-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Pillar 1: Skip E2E when the PR doesn't affect the app ───────────────────
  detect-e2e-impact:
    if: >-
      (github.event.action == 'synchronize' || github.event.action == 'opened')
      && github.event.pull_request.base.ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app_impacting: ${{ steps.filter.outputs.app_impacting }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            app_impacting:
              - 'app/**'
              - 'share_extension/**'
              - 'libraries/**'
              - 'android/**'
              - 'ios/**'
              - 'types/**'
              - 'package.json'
              - 'package-lock.json'
              - 'patches/**'
              - 'babel.config.js'
              - 'metro.config.js'
              - 'tsconfig.json'
              - 'index.tsx'
              - 'app.json'
              - 'react-native.config.js'
              - 'assets/fonts/**'
              - 'assets/sounds/**'
              - 'assets/base/images/**'
              - 'assets/base/release/**'
              - 'assets/base/config.json'
              - '.detoxrc.json'
              - 'detox/e2e/**'
              - 'detox/maestro/**'
              - 'detox/scripts/**'
              - '.github/workflows/e2e-*.yml'
              - '.github/actions/cancel-e2e-runs/**'
              - '.github/actions/compute-e2e-build-fingerprint/**'
              - '.github/actions/s3-build-cache/**'
              - '.github/actions/prepare-ios-build/**'
              - '.github/actions/prepare-android-build/**'
              - '.github/actions/build-android-maestro-apk/**'

  # Always cancel superseded runs on synchronize — including docs-only pushes —
  # so a prior app-impacting run does not keep burning minutes after skip statuses.
  cancel-stale-e2e-on-push:
    needs: detect-e2e-impact
    if: >-
      always()
      && needs.detect-e2e-impact.result == 'success'
      && github.event.action == 'synchronize'
      && github.event.pull_request.base.ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Force-cancel in-flight E2E runs for the previous commit
        uses: ./.github/actions/cancel-e2e-runs
        with:
          head_branch: ${{ github.event.pull_request.head.ref }}
          pr_number: ${{ github.event.pull_request.number }}
          exclude_head_sha: ${{ github.event.pull_request.head.sha }}
          reason: E2E superseded by new commit push

  refresh-e2e-run-label:
    needs:
      - detect-e2e-impact
      - cancel-stale-e2e-on-push
    if: >-
      always()
      && needs.detect-e2e-impact.result == 'success'
      && needs.detect-e2e-impact.outputs.app_impacting == 'true'
      && github.event.action == 'synchronize'
      && github.event.pull_request.base.ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      statuses: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Remove and re-add E2E/Run for Matterwick
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const runLabels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];

            const {data: labels} = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map((label) => label.name);

            if (labelNames.includes('E2E/Override')) {
              core.info(`PR #${prNumber} has E2E/Override — stripping run labels only.`);
              for (const label of runLabels) {
                if (!labelNames.includes(label)) {
                  continue;
                }
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: prNumber, name: label,
                  });
                } catch (err) {
                  if (err.status !== 404) {
                    throw err;
                  }
                }
              }
              return;
            }

            // Remove first so re-adding always emits pull_request:labeled for Matterwick.
            for (const label of runLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label,
                });
                core.info(`Removed ${label} from PR #${prNumber} before refresh.`);
              } catch (err) {
                if (err.status !== 404) {
                  throw err;
                }
              }
            }

            core.info(`PR #${prNumber} synchronize — re-adding E2E/Run (Matterwick labeled hook).`);
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber,
              labels: ['E2E/Run'],
            });

  # ── Post commit statuses when E2E is skipped ────────────────────────────────
  post-skip-status:
    needs: detect-e2e-impact
    if: >-
      always()
      && needs.detect-e2e-impact.result == 'success'
      && needs.detect-e2e-impact.outputs.app_impacting != 'true'
      && (github.event.action == 'synchronize' || github.event.action == 'opened')
      && github.event.pull_request.base.ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      statuses: write
    steps:
      - name: Post skip status for all E2E contexts
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;
            const contexts = [
              'e2e/detox-ios-tests',
              'e2e/detox-android-tests',
              'e2e/detox-ipad-tests',
              'e2e/maestro-ios-tests',
              'e2e/maestro-android-tests'
            ];
            
            for (const ctx of contexts) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state: 'success',
                context: ctx,
                description: 'E2E skipped — no app-impacting changes (remove+re-add E2E/Run to force)'
              });
            }

  add-e2e-run-label:
    needs: detect-e2e-impact
    if: >-
      always()
      && needs.detect-e2e-impact.result == 'success'
      && needs.detect-e2e-impact.outputs.app_impacting == 'true'
      && github.event.action == 'opened'
      && github.event.pull_request.base.ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add E2E/Run (PAT — emits labeled webhook for Matterwick)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const runLabels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];

            const {data: labels} = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map((label) => label.name);

            if (labelNames.includes('E2E/Override')) {
              core.info(`PR #${prNumber} has E2E/Override label — skipping E2E/Run.`);
              for (const label of runLabels) {
                if (!labelNames.includes(label)) {
                  continue;
                }
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: prNumber, name: label,
                  });
                  core.info(`Removed stale ${label} from PR #${prNumber} (E2E/Override active).`);
                } catch (err) {
                  if (err.status === 404) {
                    continue;
                  }
                  throw err;
                }
              }
              return;
            }

            if (labelNames.includes('E2E/Run')) {
              core.info(`PR #${prNumber} already has E2E/Run on open — skipping add.`);
              return;
            }

            core.info(`PR #${prNumber} opened — adding E2E/Run via PAT (Matterwick labeled hook).`);
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber,
              labels: ['E2E/Run'],
            });

  e2e-label-manager:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
      actions: write
      statuses: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # ── Honor E2E/Override: strip run labels + cancel in-flight E2E ─────────
      - name: Honor E2E/Override
        if: >-
          github.event.action == 'labeled'
          && github.event.label.name == 'E2E/Override'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const runLabels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];

            for (const label of runLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label,
                });
                core.info(`Removed ${label} from PR #${prNumber} (E2E/Override applied).`);
              } catch (err) {
                if (err.status === 404) {
                  core.info(`${label} was not set on PR #${prNumber}; nothing to remove.`);
                  continue;
                }
                throw err;
              }
            }

      - name: Cancel in-progress E2E runs
        if: >-
          github.event.pull_request.head.repo.full_name == github.repository
          && github.event.action == 'labeled'
          && github.event.label.name == 'E2E/Override'
        uses: ./.github/actions/cancel-e2e-runs
        with:
          head_branch: ${{ github.event.pull_request.head.ref }}
          pr_number: ${{ github.event.pull_request.number }}
          reason: E2E cancelled (E2E/Override label applied)
