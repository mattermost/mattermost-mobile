# Three steps in a single job, each gated by event type:
#
#   1. Add E2E/Run (opened / synchronize):
#      - synchronize: strip stale E2E/Run* (job strip-e2e-run-labels), then re-add
#      - opened: add unless E2E/Run already present
#      Skips when E2E/Override is present (opt-out for docs-only PRs).
#
#   2. Honor E2E/Override (labeled E2E/Override):
#      Removes all E2E/Run* labels and cancels in-progress E2E workflow runs.
#
#   3. Cancel in-progress E2E runs (E2E/Run* unlabeled by a human):
#      Skips when github-actions[bot] removed the label (refresh strip or post-run
#      cleanup) to avoid racing Matterwick dispatch on synchronize refreshes.
#
# Fork PR guard (github.event.pull_request.head.repo.full_name == github.repository)
# is applied per-step. Fork PR contexts only get a read-only GITHUB_TOKEN, so
# addLabels / removeLabel / gh-run-cancel would all 403. Mandatory E2E for fork
# PRs is enforced separately.
#
name: E2E label manager

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled
      - unlabeled

jobs:
  # On push, remove stale E2E/Run* so the follow-up add emits a labeled webhook.
  strip-e2e-run-labels:
    if: >-
      github.event.action == 'synchronize'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Strip stale E2E/Run labels before refresh
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const runLabels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];

            const {data: labels} = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map((label) => label.name);

            for (const label of runLabels) {
              if (!labelNames.includes(label)) {
                continue;
              }
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label,
                });
                core.info(`Removed ${label} from PR #${prNumber} before refresh (synchronize).`);
              } catch (err) {
                if (err.status !== 404) {
                  throw err;
                }
              }
            }

  add-e2e-run-label:
    needs: strip-e2e-run-labels
    if: >-
      always()
      && !cancelled()
      && (needs.strip-e2e-run-labels.result == 'success' || needs.strip-e2e-run-labels.result == 'skipped')
      && (github.event.action == 'opened' || github.event.action == 'synchronize')
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Add E2E/Run (PAT — emits labeled webhook for Matterwick)
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        with:
          github-token: ${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const runLabels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];

            const {data: labels} = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map((label) => label.name);

            if (labelNames.includes('E2E/Override')) {
              core.info(`PR #${prNumber} has E2E/Override label — skipping E2E/Run.`);
              for (const label of runLabels) {
                if (!labelNames.includes(label)) {
                  continue;
                }
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: prNumber, name: label,
                  });
                  core.info(`Removed stale ${label} from PR #${prNumber} (E2E/Override active).`);
                } catch (err) {
                  if (err.status !== 404) {
                    throw err;
                  }
                }
              }
              return;
            }

            if (context.payload.action === 'opened' && labelNames.includes('E2E/Run')) {
              core.info(`PR #${prNumber} already has E2E/Run on open — skipping add.`);
              return;
            }

            core.info(`PR #${prNumber} ${context.payload.action} — adding E2E/Run via PAT (Matterwick labeled hook).`);
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber,
              labels: ['E2E/Run'],
            });

  e2e-label-manager:
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
      actions: write
    steps:

      # ── Honor E2E/Override: strip run labels + cancel in-flight E2E ─────────
      - name: Honor E2E/Override
        if: >-
          github.event.action == 'labeled'
          && github.event.label.name == 'E2E/Override'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            const runLabels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];

            for (const label of runLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label,
                });
                core.info(`Removed ${label} from PR #${prNumber} (E2E/Override applied).`);
              } catch (err) {
                if (err.status === 404) {
                  core.info(`${label} was not set on PR #${prNumber}; nothing to remove.`);
                  continue;
                }
                throw err;
              }
            }

            const workflows = await github.rest.actions.listRepoWorkflows({owner, repo});
            const e2eWorkflow = workflows.data.workflows.find((workflow) => workflow.name === 'E2E');
            if (!e2eWorkflow) {
              core.info('No E2E workflow found — nothing to cancel.');
              return;
            }

            let cancelled = 0;
            for (const status of ['in_progress', 'queued', 'waiting']) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: e2eWorkflow.id,
                status,
              });
              for (const run of runs.data.workflow_runs) {
                if (run.head_sha !== headSha) {
                  continue;
                }
                const isCurrentPr = !run.pull_requests?.length
                  || run.pull_requests.some((pr) => pr.number === prNumber);
                if (!isCurrentPr) {
                  continue;
                }
                core.info(`Cancelling E2E run ${run.id} (E2E/Override applied).`);
                await github.rest.actions.cancelWorkflowRun({
                  owner, repo, run_id: run.id,
                });
                cancelled++;
              }
            }
            core.info(`Cancelled ${cancelled} E2E workflow run(s) for PR #${prNumber} (override).`);

      # ── Cancel in-progress E2E when a human removes E2E/Run* ───────────────
      - name: Cancel in-progress E2E runs
        if: >-
          github.event.action == 'unlabeled'
          && (github.event.label.name == 'E2E/Run'
              || github.event.label.name == 'E2E/Run-iOS'
              || github.event.label.name == 'E2E/Run-Android')
          && github.event.pull_request.head.repo.full_name == github.repository
          && github.event.sender.login != 'github-actions[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REMOVED_LABEL: ${{ github.event.label.name }}
          REMOVED_BY: ${{ github.event.sender.login }}
        run: |
          echo "Label \"$REMOVED_LABEL\" removed from PR #$PR_NUMBER by $REMOVED_BY (sha: $HEAD_SHA)"
          cancelled=0
          for status in in_progress queued waiting; do
            ids=$(gh run list \
              --workflow "e2e-detox-pr.yml" \
              --status "$status" \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha==\"$HEAD_SHA\") | .databaseId")
            for id in $ids; do
              echo "Cancelling run $id (status: $status)"
              if gh run cancel "$id"; then
                cancelled=$((cancelled + 1))
              else
                echo "::warning::Failed to cancel run $id"
              fi
            done
          done
          echo "Cancelled $cancelled E2E workflow run(s) for PR #$PR_NUMBER"
