# Auto-applies the `E2E/Run` label on every PR push so Matterwick provisions
# servers and runs the Detox suite by default. Developers can opt out by
# adding the `E2E/Override` label (e.g. for docs-only or script-only PRs
# that don't touch app code).
#
# Flow:
#   - PR opened or new push:
#       - If `E2E/Override` is present → skip (no E2E run)
#       - Else if `E2E/Run` already present → skip (Matterwick already running)
#       - Else → add `E2E/Run` (triggers Matterwick)
#   - PR labeled with `E2E/Override` while `E2E/Run` is set → remove `E2E/Run`
#     (and the cancel-on-label-removal workflow cancels any in-flight runs)
#
name: E2E label manager

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled

jobs:
  ensure-e2e-run:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Add E2E/Run unless E2E/Override is present
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const {data: labels} = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map(l => l.name);

            if (labelNames.includes('E2E/Override')) {
              core.info(`PR #${prNumber} has E2E/Override label — skipping E2E/Run.`);
              return;
            }
            if (labelNames.includes('E2E/Run')) {
              core.info(`PR #${prNumber} already has E2E/Run — Matterwick will pick up; skipping.`);
              return;
            }

            core.info(`PR #${prNumber} ${context.payload.action} — adding E2E/Run label.`);
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber,
              labels: ['E2E/Run'],
            });

  # When E2E/Override is added mid-flight, strip E2E/Run so the cancel-on-
  # label-removal workflow tears down any in-progress runs.
  honor-override:
    if: github.event.action == 'labeled' && github.event.label.name == 'E2E/Override'
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Remove E2E/Run when override is applied
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: prNumber, name: 'E2E/Run',
              });
              core.info(`Removed E2E/Run from PR #${prNumber} (E2E/Override applied).`);
            } catch (err) {
              if (err.status === 404) {
                core.info(`E2E/Run was not set on PR #${prNumber}; nothing to remove.`);
                return;
              }
              throw err;
            }
