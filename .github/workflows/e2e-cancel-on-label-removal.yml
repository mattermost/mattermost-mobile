# Cancel in-progress E2E workflow runs when the E2E/Run label is removed from a PR
# by a human. Skips removals by github-actions[bot] (label refresh / post-run cleanup)
# so synchronize refreshes do not race Matterwick dispatch.
name: Cancel E2E on label removal

on:
  pull_request:
    types:
      - unlabeled

jobs:
  cancel-e2e-runs:
    if: >-
      (github.event.label.name == 'E2E/Run'
        || github.event.label.name == 'E2E/Run-iOS'
        || github.event.label.name == 'E2E/Run-Android')
      && github.event.sender.login != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    steps:
      - name: Cancel in-progress E2E workflow runs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const headBranch = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const removedLabel = context.payload.label.name;

            core.info(`Label "${removedLabel}" removed from PR #${prNumber} (branch: ${headBranch}, sha: ${headSha})`);

            // Find the E2E workflow by name (e2e-detox-pr.yml)
            const workflows = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const e2eWorkflow = workflows.data.workflows.find(w => w.name === 'E2E');
            if (!e2eWorkflow) {
              core.info('No E2E workflow found in repository');
              return;
            }

            core.info(`Found E2E workflow (id: ${e2eWorkflow.id})`);

            const statuses = ['in_progress', 'queued', 'waiting'];
            let cancelled = 0;

            for (const status of statuses) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: e2eWorkflow.id,
                status,
                branch: headBranch,
              });

              for (const run of runs.data.workflow_runs) {
                if (run.pull_requests && run.pull_requests.length > 0) {
                  const isCurrentPr = run.pull_requests.some(pr => pr.number === prNumber);
                  if (!isCurrentPr) {
                    core.info(`Skipping run ${run.id}: not associated with PR #${prNumber}`);
                    continue;
                  }
                }

                core.info(`Cancelling run ${run.id} (status: ${run.status}, branch: ${run.head_branch}, sha: ${run.head_sha})`);
                try {
                  await github.rest.actions.cancelWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  cancelled++;
                } catch (err) {
                  core.warning(`Failed to cancel run ${run.id}: ${err.message}`);
                }
              }
            }

            core.info(`Cancelled ${cancelled} E2E workflow run(s) for PR #${prNumber}`);
