# Cancel in-progress E2E workflow runs when the E2E/Run label is removed from a PR
# by a human. Skips removals by github-actions[bot] (label refresh / post-run cleanup)
# so synchronize refreshes do not race Matterwick dispatch.
name: Cancel E2E on label removal

on:
  pull_request:
    types:
      - unlabeled

jobs:
  cancel-e2e-runs:
    if: >-
      (github.event.label.name == 'E2E/Run'
        || github.event.label.name == 'E2E/Run-iOS'
        || github.event.label.name == 'E2E/Run-Android')
      && github.event.sender.login != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      statuses: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cancel in-progress E2E workflow runs
        uses: ./.github/actions/cancel-e2e-runs
        with:
          head_branch: ${{ github.event.pull_request.head.ref }}
          pr_number: ${{ github.event.pull_request.number }}
          reason: E2E cancelled (E2E/Run label removed)
