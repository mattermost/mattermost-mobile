# Cancel in-progress E2E workflow runs when the E2E/Run label is removed from a PR
# by a human. Skips removals by mattermost-build (the PAT user used by the label
# refresh job) so synchronize refreshes do not race Matterwick dispatch.
name: Cancel E2E on label removal

on:
  pull_request:
    types:
      - unlabeled

jobs:
  cancel-e2e-runs:
    if: >-
      (github.event.label.name == 'E2E/Run'
        || github.event.label.name == 'E2E/Run-iOS'
        || github.event.label.name == 'E2E/Run-Android')
      && github.event.sender.login != 'mattermost-build'
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      statuses: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Cancel in-progress E2E workflow runs
        uses: ./.github/actions/cancel-e2e-runs
        with:
          head_branch: ${{ github.event.pull_request.head.ref }}
          pr_number: ${{ github.event.pull_request.number }}
          reason: E2E cancelled (E2E/Run label removed)
