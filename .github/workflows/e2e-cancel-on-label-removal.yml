# Cancel in-progress E2E workflow runs when the E2E/Run label is removed from a PR.
# When the label is removed, Matterwick tears down the provisioned test servers,
# so there is no point in letting the E2E jobs continue — they will fail mid-way.
#
# Note: This workflow also fires when the post-test cleanup job
# (e2e-remove-matterwick-label in e2e-detox-pr.yml) strips the E2E labels at
# the end of a normal run. By then no runs are in-progress for the current
# head_sha, so the inner loop is a no-op. Benign log noise, intentionally left
# in place so the honor-override removal path (e2e-label-manager.yml) keeps
# working — both removals reach this workflow via the same `github-actions[bot]`
# sender and can't be distinguished by actor alone.
name: Cancel E2E on label removal

on:
  pull_request:
    types:
      - unlabeled

jobs:
  cancel-e2e-runs:
    if: >-
      github.event.label.name == 'E2E/Run'
      || github.event.label.name == 'E2E/Run-iOS'
      || github.event.label.name == 'E2E/Run-Android'
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    steps:
      - name: Cancel in-progress E2E workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REMOVED_LABEL: ${{ github.event.label.name }}
        run: |
          echo "Label \"$REMOVED_LABEL\" removed from PR #$PR_NUMBER (sha: $HEAD_SHA)"
          cancelled=0
          for status in in_progress queued waiting; do
            ids=$(gh run list \
              --workflow "e2e-detox-pr.yml" \
              --status "$status" \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha==\"$HEAD_SHA\") | .databaseId")
            for id in $ids; do
              echo "Cancelling run $id (status: $status)"
              if gh run cancel "$id"; then
                cancelled=$((cancelled + 1))
              else
                echo "::warning::Failed to cancel run $id"
              fi
            done
          done
          echo "Cancelled $cancelled E2E workflow run(s) for PR #$PR_NUMBER"
