name: Detox E2E Tests (Scheduled)

on:
  schedule:
    - cron: "0 0 * * 4,5" # Wednesday and Thursday midnight

env:
  INTUNE_ENABLED: 'true'

jobs:
  update-initial-status-ios:
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.sha }}
          context: e2e/detox-ios-tests
          description: Detox iOS tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.sha }}
          context: e2e/detox-android-tests
          description: Detox Android tests for mattermost mobile app have started ...
          status: pending

  build-ios-simulator:
    runs-on: macos-15
    needs:
      - update-initial-status-ios
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute iOS build cache key
        id: ios-cache-key
        run: echo "hash=${{ hashFiles('ios/**', 'libraries/**', 'package-lock.json', 'patches/**') }}" >> "$GITHUB_OUTPUT"

      - name: Restore iOS simulator build cache
        id: ios-build-cache
        uses: actions/cache/restore@v4
        with:
          path: Mattermost-simulator-x86_64.app.zip
          key: ios-sim-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Restore Xcode build intermediates
        id: xcode-intermediates-cache
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            ios/Build/Products
            !ios/Build/Products/Release-iphonesimulator/Mattermost.app
          key: ios-intermediates-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}
          restore-keys: |
            ios-intermediates-${{ runner.os }}-${{ runner.arch }}-

      - name: Prepare iOS Build
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: ${{ env.INTUNE_ENABLED }}
          intune-ssh-private-key: ${{ secrets.MM_MOBILE_INTUNE_DEPLOY_KEY }}

      - name: Build iOS Simulator
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        env:
          TAG: "${{ github.ref }}"
          AWS_ACCESS_KEY_ID: "${{ secrets.MM_MOBILE_BETA_AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.MM_MOBILE_BETA_AWS_SECRET_ACCESS_KEY }}"
          GITHUB_TOKEN: "${{ secrets.MM_MOBILE_GITHUB_TOKEN }}"
        run: bundle exec fastlane ios simulator --env ios.simulator
        working-directory: ./fastlane

      - name: Save iOS simulator build cache
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Mattermost-simulator-x86_64.app.zip
          key: ios-sim-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Save Xcode build intermediates
        if: steps.ios-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ios/Build/Products
            !ios/Build/Products/Release-iphonesimulator/Mattermost.app
          key: ios-intermediates-${{ runner.os }}-${{ runner.arch }}-${{ steps.ios-cache-key.outputs.hash }}

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-x86_64.app.zip

  build-android-apk:
    runs-on: ubuntu-latest-8-cores
    needs:
      - update-initial-status-android
    env:
      ORG_GRADLE_PROJECT_jvmargs: -Xmx8g
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute Android build cache key
        id: android-cache-key
        run: echo "hash=${{ hashFiles('android/**', 'libraries/**', 'package-lock.json', 'patches/**') }}" >> "$GITHUB_OUTPUT"

      - name: Restore Android APK build cache
        id: android-build-cache
        uses: actions/cache/restore@v4
        with:
          path: android/app/build/outputs/apk
          key: android-apk-${{ runner.os }}-x86_64-${{ steps.android-cache-key.outputs.hash }}

      - name: Prune Docker to free up space
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: docker system prune -af

      - name: Remove npm Temporary Files
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf ~/.npm/_cacache

      - name: Prepare Android Build
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: "${{ secrets.MM_MOBILE_STORE_FILE }}"
          STORE_ALIAS: "${{ secrets.MM_MOBILE_STORE_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.MM_MOBILE_STORE_PASSWORD }}"
          MATTERMOST_BUILD_GH_TOKEN: "${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}"

      - name: Install Dependencies
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        run: sudo apt-get clean && sudo apt-get update && sudo apt-get install -y default-jdk

      - name: Cache Gradle dependencies
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2/
            ~/.gradle/caches/jars-*/
            ~/.gradle/caches/transforms-*/
            ~/.gradle/wrapper/dists/
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Restore Gradle build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/build-cache
          key: android-gradle-build-cache-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}
          restore-keys: |
            android-gradle-build-cache-${{ runner.os }}-

      - name: Cache Detox node_modules
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: detox/node_modules
          key: ${{ runner.os }}-detox-deps-${{ hashFiles('detox/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-detox-deps-

      - name: Detox build
        if: steps.android-build-cache.outputs.cache-hit != 'true'
        env:
          ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
        run: |
          cd detox
          npm install
          npm install -g detox-cli
          npm run e2e:android-inject-settings
          npm run e2e:android-build

      - name: Save Android APK build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: android/app/build/outputs/apk
          key: android-apk-${{ runner.os }}-x86_64-${{ steps.android-cache-key.outputs.hash }}

      - name: Save Gradle build cache
        if: steps.android-build-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~/.gradle/build-cache
          key: android-gradle-build-cache-${{ runner.os }}-${{ steps.android-cache-key.outputs.hash }}

      - name: Upload Android Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-files-${{ github.run_id }}
          path: android/app/build/outputs/apk

  run-ios-tests-on-main-scheduled:
    name: iOS Mobile Tests on Main (Scheduled)
    uses: ./.github/workflows/e2e-ios-template.yml
    needs:
      - build-ios-simulator
    with:
      run-type: "MAIN"
      record_tests_in_zephyr: 'true'
      MOBILE_VERSION: ${{ github.ref }}
    secrets: inherit

  run-android-tests-on-main-scheduled:
    name: Android Mobile Tests on Main (Scheduled)
    uses: ./.github/workflows/e2e-android-template.yml
    needs:
      - build-android-apk
    with:
      run-android-tests: true
      run-type: "MAIN"
      record_tests_in_zephyr: 'true'
      MOBILE_VERSION: ${{ github.ref }}
    secrets: inherit

  update-final-status-ios:
    runs-on: ubuntu-22.04
    needs:
      - run-ios-tests-on-main-scheduled
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.sha }}
          context: e2e/detox-ios-tests
          description: Completed with ${{ needs.run-ios-tests-on-main-scheduled.outputs.FAILURES }} failures
          status: ${{ needs.run-ios-tests-on-main-scheduled.outputs.STATUS }}
          target_url: ${{ needs.run-ios-tests-on-main-scheduled.outputs.TARGET_URL }}

  update-final-status-android:
    runs-on: ubuntu-22.04
    needs:
      - run-android-tests-on-main-scheduled
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ github.sha }}
          context: e2e/detox-android-tests
          description: Completed with ${{ needs.run-android-tests-on-main-scheduled.outputs.FAILURES }} failures
          status: ${{ needs.run-android-tests-on-main-scheduled.outputs.STATUS }}
          target_url: ${{ needs.run-android-tests-on-main-scheduled.outputs.TARGET_URL }}
