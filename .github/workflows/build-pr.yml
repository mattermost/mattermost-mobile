---
name: build-pr
on:
  pull_request:
    types:
      - labeled

env:
  NODE_VERSION: 22.14.0
  TERM: xterm
  IS_FORK: ${{ github.repository != 'mattermost/mattermost-mobile' }}

jobs:
  test:
    runs-on: ubuntu-22.04
    if: ${{ github.event.label.name == 'Build Apps for PR' || github.event.label.name == 'Build App for iOS' || github.event.label.name == 'Build App for Android' }}
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: ci/test
        uses: ./.github/actions/test

  build-ios-pr:
    runs-on: macos-14-large
    if: ${{ github.event.label.name == 'Build Apps for PR' || github.event.label.name == 'Build App for iOS' }}
    needs:
      - test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: ci/prepare-ios-build-fork
        if: ${{ env.IS_FORK }}
        run: |
          echo "Using debug code signing for fork build"
          echo "CODE_SIGN_IDENTITY=" >> $GITHUB_ENV
          echo "CODE_SIGNING_REQUIRED=NO" >> $GITHUB_ENV

      - name: ci/prepare-ios-build
        uses: ./.github/actions/prepare-ios-build

      - name: ci/output-ssh-private-key
        shell: bash
        run: |
          SSH_KEY_PATH=~/.ssh/id_ed25519
          mkdir -p ~/.ssh
          echo -e '${{ secrets.MM_MOBILE_PRIVATE_DEPLOY_KEY }}' > ${SSH_KEY_PATH}
          chmod 0600 ${SSH_KEY_PATH}
          ssh-keygen -y -f ${SSH_KEY_PATH} > ${SSH_KEY_PATH}.pub

      - name: ci/build-ios-pr
        env:
          BRANCH_TO_BUILD: "${{ github.event.pull_request.head.ref }}"
          AWS_ACCESS_KEY_ID: ${{ !env.IS_FORK && secrets.MM_MOBILE_PR_AWS_ACCESS_KEY_ID || secrets.FORK_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ !env.IS_FORK && secrets.MM_MOBILE_PR_AWS_SECRET_ACCESS_KEY || secrets.FORK_AWS_SECRET_ACCESS_KEY }}
          FASTLANE_TEAM_ID: ${{ !env.IS_FORK && secrets.MM_MOBILE_FASTLANE_TEAM_ID || secrets.FORK_APPLE_TEAM_ID }}
          IOS_API_ISSUER_ID: ${{ !env.IS_FORK && secrets.MM_MOBILE_IOS_API_ISSUER_ID || secrets.FORK_IOS_API_ISSUER_ID }}
          IOS_API_KEY: ${{ !env.IS_FORK && secrets.MM_MOBILE_IOS_API_KEY || secrets.FORK_IOS_API_KEY }}
          IOS_API_KEY_ID: ${{ !env.IS_FORK && secrets.MM_MOBILE_IOS_API_KEY_ID || secrets.FORK_IOS_API_KEY_ID }}
          MATCH_GIT_URL: ${{ !env.IS_FORK && secrets.MM_MOBILE_MATCH_GIT_URL || secrets.FORK_MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ !env.IS_FORK && secrets.MM_MOBILE_MATCH_PASSWORD || secrets.FORK_MATCH_PASSWORD }}
          MATTERMOST_WEBHOOK_URL: ${{ !env.IS_FORK && secrets.MM_MOBILE_PR_MATTERMOST_WEBHOOK_URL || secrets.FORK_MATTERMOST_WEBHOOK_URL }}
        run: bundle exec fastlane ios build --env ios.pr
        working-directory: ./fastlane

      - name: ci/upload-ios-pr-build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-pr-${{ github.run_id }}
          path: "*.ipa"

  build-android-pr:
    runs-on: ubuntu-22.04
    if: ${{ github.event.label.name == 'Build Apps for PR' || github.event.label.name == 'Build App for Android' }}
    needs:
      - test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: ci/prepare-android-build-fork
        if: ${{ env.IS_FORK }}
        run: |
          echo "${{ secrets.FORK_DEBUG_KEYSTORE }}" | base64 -d > android/app/debug.keystore
          echo "STORE_FILE=debug.keystore" >> $GITHUB_ENV
          echo "STORE_PASSWORD=${{ secrets.FORK_DEBUG_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.FORK_DEBUG_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV

      - name: ci/prepare-android-build
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: "${{ secrets.MM_MOBILE_STORE_FILE }}"
          STORE_ALIAS: "${{ secrets.MM_MOBILE_STORE_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.MM_MOBILE_STORE_PASSWORD }}"
          MATTERMOST_BUILD_GH_TOKEN: "${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}"

      - name: ci/build-android-pr
        env:
          BRANCH_TO_BUILD: "${{ github.event.pull_request.head.ref }}"
          AWS_ACCESS_KEY_ID: ${{ !env.IS_FORK && secrets.MM_MOBILE_PR_AWS_ACCESS_KEY_ID || secrets.FORK_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ !env.IS_FORK && secrets.MM_MOBILE_PR_AWS_SECRET_ACCESS_KEY || secrets.FORK_AWS_SECRET_ACCESS_KEY }}
          MATTERMOST_WEBHOOK_URL: ${{ !env.IS_FORK && secrets.MM_MOBILE_PR_MATTERMOST_WEBHOOK_URL || secrets.FORK_MATTERMOST_WEBHOOK_URL }}
        run: bundle exec fastlane android build --env android.pr
        working-directory: ./fastlane

      - name: ci/upload-android-pr-build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-pr-${{ github.run_id }}
          path: "*.apk"
