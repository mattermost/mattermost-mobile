name: Compatibility Matrix Testing

on:
  workflow_dispatch:
    inputs:
      CMT_MATRIX:
        description: "A JSON object representing the testing matrix"
        required: true
        type: string
      MOBILE_VERSION:
        description: "The mattermost mobile version to test"
        required: true
      cmt_run_id:
        description: "CMT provisioner run ID used for instance cleanup"
        required: false
        default: "0"
        type: string

jobs:
  ## This is picked up after the finish for cleanup
  upload-cmt-server-detals:
    runs-on: ubuntu-22.04
    steps:
      - name: cmt/generate-instance-details-file
        run: echo '${{ inputs.CMT_MATRIX }}' > instance-details.json

      - name: cmt/upload-instance-details
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: instance-details.json
          path: instance-details.json
          retention-days: 1

  calculate-commit-hash:
    runs-on: ubuntu-22.04
    outputs:
      MOBILE_SHA: ${{ steps.repo.outputs.MOBILE_SHA }}
    steps:
      - name: cmt/checkout-mobile
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: cmt/calculate-mattermost-sha
        id: repo
        run: echo "MOBILE_SHA=$(git rev-parse HEAD)" >> ${GITHUB_OUTPUT}

  update-initial-status:
    runs-on: ubuntu-22.04
    needs:
      - calculate-commit-hash
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@d5174b860704729f4c14ef8489ae075742bfa08a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ needs.calculate-commit-hash.outputs.MOBILE_SHA }}
          context: e2e/compatibility-matrix-testing
          description: "Compatibility Matrix Testing for ${{ inputs.MOBILE_VERSION }} version"
          status: pending

  # Input follows the below schema
  # {
  #   "server": [
  #     {
  #       "version": "9.6.1",
  #       "url": "https://delivery-cmt-8467830017-9-6-1.test.mattermost.cloud/"
  #     },
  #     {
  #       "version": "9.5.2",
  #       "url": "https://delivery-cmt-8467830017-9-5-2.test.mattermost.cloud/"
  #     }
  #   ]
  # }
  build-ios-simulator:
    runs-on: macos-14
    needs:
      - update-initial-status
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Prepare iOS Build
        uses: ./.github/actions/prepare-ios-build

      - name: Build iOS Simulator
        env:
          TAG: "${{ inputs.MOBILE_VERSION }}"
          GITHUB_TOKEN: "${{ secrets.MM_MOBILE_GITHUB_TOKEN }}"
        run: bundle exec fastlane ios simulator --env ios.simulator
        working-directory: ./fastlane

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-x86_64.app.zip

  # iOS smoke run, one job per server version (reuses the single simulator build above).
  detox-e2e:
    name: mobile-cmt-ios-${{ matrix.server.version }}
    # Least-privilege token for the reusable workflow: checkout (read) + the PR-comment
    # report step (issues:write). No pull-requests:* needed for issues.createComment.
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/e2e-ios-template.yml
    needs:
      - build-ios-simulator
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.CMT_MATRIX) }}
    # Pass only the secrets the iOS template uses, instead of secrets: inherit (which would
    # expose every repository secret to the reusable workflow).
    secrets:
      MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID: ${{ secrets.MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID }}
      MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY: ${{ secrets.MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY }}
      MM_MOBILE_E2E_ADMIN_EMAIL: ${{ secrets.MM_MOBILE_E2E_ADMIN_EMAIL }}
      MM_MOBILE_E2E_ADMIN_PASSWORD: ${{ secrets.MM_MOBILE_E2E_ADMIN_PASSWORD }}
      MM_MOBILE_E2E_ADMIN_USERNAME: ${{ secrets.MM_MOBILE_E2E_ADMIN_USERNAME }}
      MM_MOBILE_E2E_TEST_CYCLE_LINK_PREFIX: ${{ secrets.MM_MOBILE_E2E_TEST_CYCLE_LINK_PREFIX }}
      MM_MOBILE_E2E_WEBHOOK_URL: ${{ secrets.MM_MOBILE_E2E_WEBHOOK_URL }}
      MM_MOBILE_E2E_ZEPHYR_API_KEY: ${{ secrets.MM_MOBILE_E2E_ZEPHYR_API_KEY }}
    with:
      run-type: "RELEASE"
      MM_TEST_SERVER_URL: ${{ matrix.server.url }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      # CMT provisions one server per version, so run the single-server smoke suite only.
      tests-search-path: "detox/e2e/test/products/channels/smoke_test"
      parallelism: 1
      # Make test failures fail the run so the rollup gate below reflects real results.
      testcase_failure_fatal: true

  # Build the Android APK once; the per-version Android detox jobs below reuse it.
  build-android-apk:
    runs-on: ubuntu-latest-8-cores
    needs:
      - update-initial-status
    permissions:
      contents: read
    env:
      ORG_GRADLE_PROJECT_jvmargs: -Xmx8g
    steps:
      - name: Prune Docker to free up space
        run: docker system prune -af

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}
          # Don't leave the GITHUB_TOKEN on disk for the subsequent npm/Gradle build steps.
          persist-credentials: false

      - name: Prepare Android Build
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: ${{ secrets.MM_MOBILE_STORE_FILE }}
          STORE_ALIAS: ${{ secrets.MM_MOBILE_STORE_ALIAS }}
          STORE_PASSWORD: ${{ secrets.MM_MOBILE_STORE_PASSWORD }}
          MATTERMOST_BUILD_GH_TOKEN: ${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}

      - name: Detox build
        run: |
          cd detox
          npm ci --prefer-offline --no-audit --no-fund
          npm install -g detox-cli
          npm run e2e:android-inject-settings
          npm run e2e:android-build

      - name: Upload Android Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-files-${{ github.run_id }}
          path: "android/app/build/**/*"

  # Android smoke run, one job per server version (reuses the single APK build above).
  detox-e2e-android:
    name: mobile-cmt-android-${{ matrix.server.version }}
    # Least-privilege token for the reusable workflow: checkout (read) + the PR-comment
    # report step (issues:write). No pull-requests:* needed for issues.createComment.
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/e2e-android-template.yml
    needs:
      - build-android-apk
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.CMT_MATRIX) }}
    # Pass only the secrets the Android template uses, instead of secrets: inherit (which would
    # expose every repository secret to the reusable workflow).
    secrets:
      MATTERMOST_BUILD_GH_TOKEN: ${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}
      MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID: ${{ secrets.MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID }}
      MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY: ${{ secrets.MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY }}
      MM_MOBILE_E2E_ADMIN_EMAIL: ${{ secrets.MM_MOBILE_E2E_ADMIN_EMAIL }}
      MM_MOBILE_E2E_ADMIN_PASSWORD: ${{ secrets.MM_MOBILE_E2E_ADMIN_PASSWORD }}
      MM_MOBILE_E2E_ADMIN_USERNAME: ${{ secrets.MM_MOBILE_E2E_ADMIN_USERNAME }}
      MM_MOBILE_E2E_TEST_CYCLE_LINK_PREFIX: ${{ secrets.MM_MOBILE_E2E_TEST_CYCLE_LINK_PREFIX }}
      MM_MOBILE_E2E_WEBHOOK_URL: ${{ secrets.MM_MOBILE_E2E_WEBHOOK_URL }}
      MM_MOBILE_E2E_ZEPHYR_API_KEY: ${{ secrets.MM_MOBILE_E2E_ZEPHYR_API_KEY }}
      MM_MOBILE_STORE_ALIAS: ${{ secrets.MM_MOBILE_STORE_ALIAS }}
      MM_MOBILE_STORE_FILE: ${{ secrets.MM_MOBILE_STORE_FILE }}
      MM_MOBILE_STORE_PASSWORD: ${{ secrets.MM_MOBILE_STORE_PASSWORD }}
    with:
      run-android-tests: true
      run-type: "RELEASE"
      MM_TEST_SERVER_URL: ${{ matrix.server.url }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      # CMT provisions one server per version, so run the single-server smoke suite only.
      tests-search-path: "detox/e2e/test/products/channels/smoke_test"
      parallelism: 1
      # Make test failures fail the run so the rollup gate below reflects real results.
      testcase_failure_fatal: true

  update-final-status:
    runs-on: ubuntu-22.04
    if: always()
    needs:
      - calculate-commit-hash
      - detox-e2e
      - detox-e2e-android
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ needs.calculate-commit-hash.outputs.MOBILE_SHA }}
          context: e2e/compatibility-matrix-testing
          description: Compatibility Matrix Testing for ${{ inputs.MOBILE_VERSION }} version
          # detox-e2e / detox-e2e-android are matrix jobs over CMT_MATRIX; their .outputs are
          # not aggregated across legs, so gate on the job result instead. testcase_failure_fatal
          # makes any version leg with test failures fail its run, so .result is 'failure' if any
          # iOS or Android version leg failed.
          status: ${{ (needs.detox-e2e.result == 'success' && needs.detox-e2e-android.result == 'success') && 'success' || 'failure' }}
          target_url: ${{ needs.detox-e2e.outputs.TARGET_URL }}

      # Instance cleanup is handled by Matterwick: when this workflow completes, GitHub sends a
      # workflow_run "completed" event and Matterwick destroys the servers it provisioned for
      # this run (matched by commit SHA). No in-workflow cleanup call is needed.

