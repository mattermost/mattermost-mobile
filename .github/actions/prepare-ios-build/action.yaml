name: prepare-ios-build
description: Action to prepare environment for ios build

inputs:
  intune-enabled:
    description: 'Enable Intune MAM features (requires Xcode 26.1+)'
    required: false
    default: 'false'
  intune-ssh-private-key:
    description: 'SSH private key for Intune submodule repository access (required if intune-enabled is true)'
    required: false

runs:
  using: composite
  steps:
    - name: ci/select-xcode-26
      shell: bash
      run: |
        # Intune (and this action's Xcode switch) require Xcode 26.1+.
        MIN_VERSION=26.1
        version_ge() {
          # True when $1 >= $2 (version-sort).
          [ "$(printf '%s\n%s\n' "$2" "$1" | sort -V | head -1)" = "$2" ]
        }

        CURRENT_SDK=$(xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null || echo "0")
        echo "Default Xcode SDK version: ${CURRENT_SDK}"

        if version_ge "$CURRENT_SDK" "$MIN_VERSION"; then
          echo "Default Xcode ($CURRENT_SDK) meets ${MIN_VERSION}+ requirement; nothing to do."
          exit 0
        fi

        # Find the highest pre-installed Xcode with version >= 26.1.
        # Scan all Xcode_*.app directories, extract the version from the name,
        # filter >= 26.1, and select the highest. Future-proofs for Xcode 30+.
        XCODE_26=$(for app in /Applications/Xcode_*.app; do
          [ -d "$app" ] || continue
          ver=$(basename "$app" .app | sed 's/^Xcode_//')
          version_ge "$ver" "$MIN_VERSION" && echo "$app"
        done | sort -V | tail -1 || echo "")
        if [ -z "$XCODE_26" ]; then
          echo "::error::No Xcode ${MIN_VERSION}+ found pre-installed on this runner and default is $CURRENT_SDK."
          exit 1
        fi

        echo "Switching Xcode from default ($CURRENT_SDK) to ${XCODE_26##*/}"
        sudo xcode-select -s "$XCODE_26"
        NEW_SDK=$(xcrun --sdk iphonesimulator --show-sdk-version)
        echo "Now using Xcode SDK version: ${NEW_SDK}"

    - name: ci/ensure-ios-platform-installed
      # The macos-26 runner image ships Xcode with iOS SDK headers but
      # does not always pre-download the matching iOS Simulator runtime.
      # Without it, xcodebuild fails with:
      #   "Ineligible destinations ... error:iOS X.Y is not installed."
      #
      # We derive the required iOS version dynamically from the active
      # Xcode (via xcrun --show-sdk-version) instead of hardcoding it,
      # so this stays in sync whether the runner default changes or
      # someone sets DEVELOPER_DIR / xcode-select.
      shell: bash
      run: |
        # Derive the required iOS Simulator runtime version from the active
        # Xcode.  This keeps the check in sync with whatever Xcode is
        # selected (default, xcode-select, or DEVELOPER_DIR).
        REQUIRED_IOS_RUNTIME=$(xcrun --sdk iphonesimulator --show-sdk-version)
        echo "Active Xcode expects iOS Simulator runtime: ${REQUIRED_IOS_RUNTIME}"

        # Wait up to 60s for CoreSimulator service to come up so the queries
        # below are reliable. Fresh macos-26 runners can lag past job start.
        for attempt in {1..12}; do
          if xcrun simctl list runtimes >/dev/null 2>&1; then
            break
          fi
          echo "Waiting for CoreSimulator service... (${attempt}/12)"
          sleep 5
        done
        if ! xcrun simctl list runtimes >/dev/null 2>&1; then
          echo "::error::CoreSimulator service did not become ready within 60s."
          exit 1
        fi

        # No-op only when the EXACT required iOS runtime is already installed.
        # Trailing space in pattern distinguishes "iOS X.Y" from "iOS X.YZ".
        if xcrun simctl list runtimes 2>/dev/null | grep -qE "iOS ${REQUIRED_IOS_RUNTIME}( |$)"; then
          echo "iOS ${REQUIRED_IOS_RUNTIME} Simulator runtime already installed; skipping -downloadPlatform."
          exit 0
        fi

        echo "iOS ${REQUIRED_IOS_RUNTIME} Simulator runtime not installed. Currently installed runtimes:"
        xcrun simctl list runtimes 2>/dev/null | grep -E "^iOS " || echo "(none)"

        # Otherwise download with retry; daemon races still possible.
        for attempt in 1 2 3; do
          echo "xcodebuild -downloadPlatform iOS (attempt $attempt/3)..."
          if xcodebuild -downloadPlatform iOS; then
            echo "Download command succeeded. Installed iOS runtimes:"
            xcrun simctl list runtimes 2>/dev/null | grep -E "^iOS " || echo "(none)"
            # xcodebuild -downloadPlatform iOS can exit 0 while installing a
            # different iOS major (it follows Xcode's bundled SDK, which
            # occasionally lags). Re-run the exact version check so we fail
            # loudly here instead of in later steps with the opaque
            # "Ineligible destinations" error.
            if xcrun simctl list runtimes 2>/dev/null | grep -qE "iOS ${REQUIRED_IOS_RUNTIME}( |$)"; then
              echo "iOS ${REQUIRED_IOS_RUNTIME} runtime now installed."
              exit 0
            fi
            echo "::error::xcodebuild -downloadPlatform iOS succeeded but iOS ${REQUIRED_IOS_RUNTIME} is still not present."
            exit 1
          fi
          echo "Attempt $attempt failed; retrying in 30s..."
          sleep 30
        done
        echo "::error::xcodebuild -downloadPlatform iOS failed after 3 attempts."
        exit 1

    - name: ci/prepare-mobile-build
      uses: ./.github/actions/prepare-mobile-build

    - name: ci/setup-intune
      if: inputs.intune-enabled == 'true'
      uses: ./.github/actions/setup-intune
      with:
        ssh-private-key: ${{ inputs.intune-ssh-private-key }}

    - name: Get Intune submodule commit hash
      if: inputs.intune-enabled == 'true'
      id: intune-hash
      shell: bash
      run: |
        if [ -e "libraries/@mattermost/intune/.git" ]; then
          INTUNE_HASH=$(cd libraries/@mattermost/intune && git rev-parse --short HEAD)
          echo "hash=${INTUNE_HASH}" >> $GITHUB_OUTPUT
        else
          echo "hash=none" >> $GITHUB_OUTPUT
        fi

    - name: Cache Pods
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ios/Pods
          libraries/@mattermost/intune/ios/Frameworks
        key: ${{ runner.os }}-pods-v4-intune-${{ inputs.intune-enabled }}-${{ steps.intune-hash.outputs.hash }}-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-v4-intune-${{ inputs.intune-enabled }}-${{ steps.intune-hash.outputs.hash }}-

    - name: Cache CocoaPods Ruby gems
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-cocoapods-gems-${{ hashFiles('Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-cocoapods-gems-

    - name: ci/install-pods-dependencies
      shell: bash
      env:
        INTUNE_ENABLED: ${{ inputs.intune-enabled }}
      run: |
        echo "::group::install-pods-dependencies"
        echo "INTUNE_ENABLED=$INTUNE_ENABLED"
        bundle config set --local path vendor/bundle
        bundle install
        npm run pod-install
        echo "::endgroup::"
