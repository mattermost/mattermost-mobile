name: prepare-ios-build
description: Action to prepare environment for ios build

inputs:
  intune-enabled:
    description: 'Enable Intune MAM features (requires Xcode 26.1+)'
    required: false
    default: 'false'
  intune-ssh-private-key:
    description: 'SSH private key for Intune submodule repository access (required if intune-enabled is true)'
    required: false

runs:
  using: composite
  steps:
    - name: ci/setup-xcode
      uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: '26.1'

    - name: ci/ensure-ios-platform-installed
      # The macos-26 runner image ships Xcode 26.1.1 with the iOS SDK headers
      # but does not pre-download the matching iOS 26.1 platform runtime.
      # Without it, storyboard / asset compilation in the MattermostShare
      # extension fails with "iOS 26.1 Platform Not Installed".
      #
      # Skip when an iOS Simulator runtime is already present (no network
      # call), and retry the download up to 3× when the CoreSimulator
      # daemon isn't ready (xcodebuild -downloadPlatform exits 70 with
      # "Unable to connect to simulator" on a freshly-booted macos-26
      # runner before launchd has initialized the simulator services).
      shell: bash
      run: |
        # Wait up to 60s for CoreSimulator service to come up so the queries
        # below are reliable. Fresh macos-26 runners can lag past job start.
        for waited in 0 5 10 15 20 30 45 60; do
          if xcrun simctl list runtimes >/dev/null 2>&1; then break; fi
          echo "Waiting ${waited}s for CoreSimulator service..."
          sleep 5
        done

        # No-op when a non-trivial iOS runtime is already installed.
        if xcrun simctl list runtimes 2>/dev/null | grep -qE "iOS [0-9]+\.[0-9]+ "; then
          echo "iOS Simulator runtime already installed; skipping -downloadPlatform."
          exit 0
        fi

        # Otherwise download with retry; daemon races still possible.
        for attempt in 1 2 3; do
          echo "xcodebuild -downloadPlatform iOS (attempt $attempt/3)..."
          if xcodebuild -downloadPlatform iOS; then
            exit 0
          fi
          echo "Attempt $attempt failed; retrying in 30s..."
          sleep 30
        done
        echo "::error::xcodebuild -downloadPlatform iOS failed after 3 attempts."
        exit 1

    - name: ci/prepare-mobile-build
      uses: ./.github/actions/prepare-mobile-build

    - name: ci/setup-intune
      if: inputs.intune-enabled == 'true'
      uses: ./.github/actions/setup-intune
      with:
        ssh-private-key: ${{ inputs.intune-ssh-private-key }}

    - name: Get Intune submodule commit hash
      if: inputs.intune-enabled == 'true'
      id: intune-hash
      shell: bash
      run: |
        if [ -e "libraries/@mattermost/intune/.git" ]; then
          INTUNE_HASH=$(cd libraries/@mattermost/intune && git rev-parse --short HEAD)
          echo "hash=${INTUNE_HASH}" >> $GITHUB_OUTPUT
        else
          echo "hash=none" >> $GITHUB_OUTPUT
        fi

    - name: Cache Pods
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ios/Pods
          libraries/@mattermost/intune/ios/Frameworks
        key: ${{ runner.os }}-pods-v4-intune-${{ inputs.intune-enabled }}-${{ steps.intune-hash.outputs.hash }}-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-v4-intune-${{ inputs.intune-enabled }}-${{ steps.intune-hash.outputs.hash }}-

    - name: ci/install-pods-dependencies
      shell: bash
      env:
        INTUNE_ENABLED: ${{ inputs.intune-enabled }}
      run: |
        echo "::group::install-pods-dependencies"
        echo "INTUNE_ENABLED=$INTUNE_ENABLED"
        npm run ios-gems
        npm run pod-install
        echo "::endgroup::"
