# MM-T2862: User can share an image to a Mattermost channel via the share extension.
#
# PRE-CONDITIONS:
#   - Logged-in test user with access to test channel
#   - Photos app has at least one image (simulator library)
#
# REQUIRED ENV VARS:
#   - MAESTRO_APP_ID, TEST_USER_EMAIL, TEST_USER_PASSWORD, TEST_CHANNEL_NAME
#
# ASSERTIONS:
#   - Image shared from Photos reaches Mattermost share extension
#   - User selects channel and posts; image appears in channel post list
#
# testIDs:
#   - share_extension.channel.option
#   - channel_item.${TEST_CHANNEL_NAME}
#   - share_extension.post.button
#   - channel.post_list.post
tags:
  - MM-T2862
appId: ${MAESTRO_APP_ID}
---
- runFlow: ../../utils/login.yml

- runFlow:
    when:
      platform: iOS
    commands:
      - runFlow:
          file: ../../utils/share_photo_from_library_ios.yml
      - runFlow:
          file: ../../utils/select_mattermost_ios_share_sheet.yml

# Share extension opens: tap Channel option to open channel picker
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 10000
- tapOn:
    id: "share_extension.channel.option"

# Select the test channel from the channel list
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"

# Post the shared content
- tapOn:
    id: "share_extension.post.button"

# Return to Mattermost and verify the image post appeared in the channel
- launchApp:
    appId: "${MAESTRO_APP_ID}"
- extendedWaitUntil:
    visible:
      id: "channel.post_list.post"
    timeout: 20000
- assertVisible:
    id: "channel.post_list.post"
