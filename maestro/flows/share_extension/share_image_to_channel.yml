# MM-T2862: User can share an image to a Mattermost channel via the share extension.
#
# PRE-CONDITIONS:
#   - Logged-in test user with access to test channel
#   - Photos app has at least one image (simulator library)
#
# REQUIRED ENV VARS:
#   - MAESTRO_APP_ID, TEST_USER_EMAIL, TEST_USER_PASSWORD, TEST_CHANNEL_NAME
#
# ASSERTIONS:
#   - Image shared from Photos reaches Mattermost share extension
#   - User selects channel and posts; image appears in channel post list
#
# testIDs:
#   - share_extension.channel.option
#   - channel_item.${TEST_CHANNEL_NAME}
#   - share_extension.post.button
#   - channel.post_list.post
tags:
  - MM-T2862
appId: ${MAESTRO_APP_ID}
---
- runFlow: ../../utils/login.yml
- runFlow: ../../utils/navigate_to_channel.yml

# Open Photos app fresh (stopApp resets it to Library grid, avoiding photo-detail resume state)
- stopApp:
    appId: "com.apple.mobileslideshow"
- launchApp:
    appId: "com.apple.mobileslideshow"
# Wait for Photos to finish launching before checking for onboarding.
# Without this wait, the optional "Continue" tap fires before the
# "What's New in Photos" screen has rendered and Photos remains stuck
# on the onboarding overlay (confirmed via failing iOS run screenshot).
- waitForAnimationToEnd:
    timeout: 5000
# Dismiss "What's New in Photos" onboarding if present.
# Loop the tap until the Continue button is gone or Select is visible.
- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn:
          text: "Continue"
      - extendedWaitUntil:
          notVisible:
            text: "Continue"
          timeout: 10000
# iOS 26: "Select" button text IS accessible from the Library grid.
# Wait for it (not all simulator runs land directly on the grid).
- extendedWaitUntil:
    visible:
      text: "Select"
    timeout: 15000
- tapOn:
    text: "Select"
# Tap second photo in the grid to select it (~50%, ~25% for row 1, col 2 in 3-col grid)
- tapOn:
    point: "50%, 25%"
- takeScreenshot: photo-selected
# iOS 26: share icon in selection toolbar is at bottom-left.
# Coordinate: ~8% x, ~96% y (within the safe area zone on iPhone 17 Pro Max).
# No text label accessible for this icon; use coordinate tap.
# TODO: Revisit once Photos share icon is accessible via text/id in Maestro on iOS 26.
- tapOn:
    point: "8%, 96%"

- takeScreenshot: share-sheet-open
# CI .app label is "Mattermost"; local builds may show "Mattermost Beta".
- extendedWaitUntil:
    visible:
      text: "Mattermost"
    timeout: 30000
- runFlow:
    when:
      visible:
        text: "Mattermost Beta"
    commands:
      - tapOn:
          text: "Mattermost Beta"
- runFlow:
    when:
      notVisible:
        text: "Mattermost Beta"
    commands:
      - tapOn:
          text: "Mattermost"

# Share extension opens: tap Channel option to open channel picker
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 10000
- tapOn:
    id: "share_extension.channel.option"

# Select the test channel from the channel list
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"

# Post the shared content
- tapOn:
    id: "share_extension.post.button"

# Return to Mattermost and verify the image post appeared in the channel
- launchApp:
    appId: "${MAESTRO_APP_ID}"
- extendedWaitUntil:
    visible:
      id: "channel.post_list.post"
    timeout: 20000
- assertVisible:
    id: "channel.post_list.post"
- takeScreenshot: share-image-success
