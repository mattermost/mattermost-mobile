# MM-T2863: Share text to a Mattermost channel via the share extension
tags:
  - MM-T2863
appId: ${MAESTRO_APP_ID}
---
- runFlow: ../../utils/login.yml
- runFlow: ../../utils/navigate_to_channel.yml

# --- iOS: use Safari ---
- runFlow:
    when:
      platform: iOS
    commands:
      - launchApp:
          appId: "com.apple.mobilesafari"
      - extendedWaitUntil:
          visible:
            id: "TabBarItemTitle"
          timeout: 15000
      - tapOn:
          id: "TabBarItemTitle"
      - inputText: "https://wikipedia.org"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: "Wikipedia"
          timeout: 30000
      - tapOn:
          text: "Continue"
          optional: true
      # iOS 26: try the Safari toolbar Share button first (more reliable
      # across iOS versions than the long-press context menu).
      - tapOn:
          id: "Share"
          optional: true
      # Fallback: long-press a word to select, then tap "Share..." from context menu
      - extendedWaitUntil:
          visible:
            text: "Wikipedia"
          timeout: 15000
      - longPressOn:
          text: "Wikipedia"
      - takeScreenshot: after-longpress-text
      # iOS 26 context menu may not show "Share..." — try text match, then
      # fall back to a coordinate tap at the context menu position.
      - runFlow:
          when:
            visible:
              text: "Share..."
          commands:
            - tapOn:
                text: "Share..."
      - runFlow:
          when:
            notVisible:
              text: "Share..."
          commands:
            - tapOn:
                point: "50%,60%"
      - takeScreenshot: after-tap-share
      # Tap "Mattermost Beta" in the share sheet to open the share extension
      - extendedWaitUntil:
          visible:
            text: "Mattermost Beta"
          timeout: 30000
      - tapOn:
          text: "Mattermost Beta"
      - takeScreenshot: after-tap-mattermost-beta
      - extendedWaitUntil:
          visible:
            id: "share_extension.channel.option"
          timeout: 40000

# --- Android: use Chrome ---
- runFlow:
    when:
      platform: Android
    commands:
      - stopApp:
          appId: "com.android.chrome"
      - launchApp:
          appId: "com.android.chrome"
      - tapOn:
          text: "Use without an account"
          optional: true
      - tapOn:
          text: "No thanks"
          optional: true
      - tapOn:
          id: "com.android.chrome:id/search_box_text"
          optional: true
      - tapOn:
          id: "com.android.chrome:id/url_bar"
          optional: true
      - inputText: "https://wikipedia.org"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: "Wikipedia"
          timeout: 30000
      - tapOn:
          id: "com.android.chrome:id/menu_button"
      - extendedWaitUntil:
          visible:
            id: "com.android.chrome:id/share_menu_id"
          timeout: 5000
      - tapOn:
          id: "com.android.chrome:id/share_menu_id"
      # On older Android the share sheet shows a truncated list and requires
      # tapping "More" to see all targets. On API 34+ all targets are shown
      # directly. Try "More" first, and if it's absent tap Mattermost Beta
      # directly instead.
      - runFlow:
          when:
            visible:
              text: "More"
          commands:
            - tapOn:
                text: "More"
      - extendedWaitUntil:
          visible:
            text: "Mattermost Beta"
          timeout: 10000
      - tapOn:
          text: "Mattermost Beta"

# Share extension opens: tap Channel option to open channel picker
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 15000
- tapOn:
    id: "share_extension.channel.option"

# Select the test channel from the channel list
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"

# Post the shared content
- tapOn:
    id: "share_extension.post.button"

# Return to Mattermost and verify the post appeared in the channel
- launchApp:
    appId: "${MAESTRO_APP_ID}"
- extendedWaitUntil:
    visible:
      id: "channel.post_list.post"
    timeout: 15000
- assertVisible:
    id: "channel.post_list.post"
