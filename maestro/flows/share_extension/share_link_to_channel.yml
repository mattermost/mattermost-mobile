# MM-T2874: Share a link to a Mattermost channel via the share extension
tags:
  - MM-T2874
appId: com.mattermost.rnbeta
---
- runFlow: ../../utils/login.yml
- runFlow: ../../utils/navigate_to_channel.yml

# --- iOS: use Safari (Notes app not available on all simulators) ---
- runFlow:
    when:
      platform: iOS
    commands:
      - stopApp:
          appId: "com.apple.mobilesafari"
      - launchApp:
          appId: "com.apple.mobilesafari"
      - waitForAnimationToEnd:
          timeout: 5000
      - tapOn:
          id: "TabBarItemTitle"
      - inputText: "https://example.com"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: "Example Domain"
          timeout: 30000
      - tapOn:
          text: "Continue"
          optional: true
      # Tap the Safari Share button in the toolbar
      - tapOn:
          id: "Share"
          optional: true
      # Fallback: long-press approach if Share button not found
      - extendedWaitUntil:
          visible:
            text: "Example Domain"
          timeout: 10000
      - longPressOn:
          text: "Example"
      - runFlow:
          when:
            visible:
              text: "Share..."
          commands:
            - tapOn:
                text: "Share..."
      # Tap "Mattermost Beta" in the share sheet
      - extendedWaitUntil:
          visible:
            text: "Mattermost Beta"
          timeout: 30000
      - tapOn:
          text: "Mattermost Beta"
      - extendedWaitUntil:
          visible:
            id: "share_extension.channel.option"
          timeout: 40000

# --- Android: use Chrome ---
- runFlow:
    when:
      platform: Android
    commands:
      - stopApp:
          appId: "com.android.chrome"
      - launchApp:
          appId: "com.android.chrome"
      - tapOn:
          text: "Use without an account"
          optional: true
      - tapOn:
          text: "No thanks"
          optional: true
      # Handle new tab page (search_box_text) vs. returning to last page (url_bar)
      - tapOn:
          id: "com.android.chrome:id/search_box_text"
          optional: true
      - tapOn:
          id: "com.android.chrome:id/url_bar"
          optional: true
      - inputText: "https://example.com"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: "Example Domain"
          timeout: 30000
      # Open Chrome overflow menu and tap Share
      - tapOn:
          id: "com.android.chrome:id/menu_button"
      - extendedWaitUntil:
          visible:
            id: "com.android.chrome:id/share_menu_id"
          timeout: 5000
      - tapOn:
          id: "com.android.chrome:id/share_menu_id"
      # On older Android the share sheet shows a truncated list and requires
      # tapping "More" to see all targets. On API 34+ all targets are shown
      # directly. Try "More" first, and if it's absent tap Mattermost Beta
      # directly instead.
      - runFlow:
          when:
            visible:
              text: "More"
          commands:
            - tapOn:
                text: "More"
      - extendedWaitUntil:
          visible:
            text: "Mattermost Beta"
          timeout: 10000
      - tapOn:
          text: "Mattermost Beta"

# Share extension opens: tap Channel option to open channel picker
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 15000
- tapOn:
    id: "share_extension.channel.option"

# Select the test channel from the channel list
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"

# Post the shared content
- tapOn:
    id: "share_extension.post.button"

# Return to Mattermost and verify the link post appeared in the channel
- launchApp:
    appId: "com.mattermost.rnbeta"
- extendedWaitUntil:
    visible:
      id: "channel.post_list.post"
    timeout: 15000
- assertVisible:
    id: "channel.post_list.post"
