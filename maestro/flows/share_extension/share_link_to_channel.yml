# MM-T2874: User can share a link to a Mattermost channel via the share extension.
#
# PRE-CONDITIONS:
#   - Logged-in test user with access to test channel
#   - iOS: Safari with example.com loaded; Android: Chrome with example.com loaded
#
# REQUIRED ENV VARS:
#   - MAESTRO_APP_ID, TEST_USER_EMAIL, TEST_USER_PASSWORD, TEST_CHANNEL_NAME
#
# ASSERTIONS:
#   - Link shared via system share sheet opens Mattermost share extension
#   - Posted link appears in the target channel
#
# testIDs:
#   - share_extension.channel.option
#   - channel_item.${TEST_CHANNEL_NAME}
#   - share_extension.post.button
#   - channel.post_list.post
tags:
  - MM-T2874
appId: ${MAESTRO_APP_ID}
env:
  SYNC_TOKEN: "example.com"
---
- runFlow: ../../utils/login.yml

# --- iOS: use Safari (Notes app not available on all simulators) ---
- runFlow:
    when:
      platform: iOS
    commands:
      - stopApp:
          appId: "${MAESTRO_APP_ID}"
      - runFlow:
          file: ../../utils/open_url_in_safari_ios.yml
          env:
            SAFARI_URL: "https://example.com"
            SAFARI_PAGE_TITLE: "Example Domain"
      - extendedWaitUntil:
          visible:
            text: "Example Domain"
          timeout: 30000
      - runFlow:
          file: ../../utils/share_safari_url_ios.yml
      - runFlow:
          file: ../../utils/select_mattermost_ios_from_safari.yml

# --- Android: use Chrome ---
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          file: ../../utils/warm_android_share_target.yml
      - runFlow:
          file: ../../utils/open_url_in_chrome_android.yml
          env:
            CHROME_URL: "https://example.com"
      - extendedWaitUntil:
          visible:
            text: "Example Domain"
          timeout: 30000
      # Open Chrome overflow menu and tap Share
      - tapOn:
          id: "com.android.chrome:id/menu_button"
      - extendedWaitUntil:
          visible:
            id: "com.android.chrome:id/share_menu_id"
          timeout: 5000
      - tapOn:
          id: "com.android.chrome:id/share_menu_id"
      - runFlow:
          file: ../../utils/select_mattermost_android_share_sheet.yml

# Share extension opens: tap Channel option to open channel picker
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 15000
- tapOn:
    id: "share_extension.channel.option"

# Select the test channel from the channel list
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"

# Post the shared content
- tapOn:
    id: "share_extension.post.button"
- waitForAnimationToEnd:
    timeout: 5000
