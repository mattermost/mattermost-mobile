# MM-T2874: User can share a link to a Mattermost channel via the share extension.
#
# PRE-CONDITIONS:
#   - Logged-in test user with access to test channel
#   - iOS: Safari with example.com loaded; Android: Chrome with example.com loaded
#
# REQUIRED ENV VARS:
#   - MAESTRO_APP_ID, TEST_USER_EMAIL, TEST_USER_PASSWORD, TEST_CHANNEL_NAME
#
# ASSERTIONS:
#   - Link shared via system share sheet opens Mattermost share extension
#   - Posted link appears in the target channel
#
# testIDs:
#   - share_extension.channel.option
#   - channel_item.${TEST_CHANNEL_NAME}
#   - share_extension.post.button
#   - channel.post_list.post
tags:
  - MM-T2874
appId: ${MAESTRO_APP_ID}
---
- runFlow: ../../utils/login.yml
- runFlow: ../../utils/navigate_to_channel.yml

# --- iOS: use Safari (Notes app not available on all simulators) ---
- runFlow:
    when:
      platform: iOS
    commands:
      - stopApp:
          appId: "${MAESTRO_APP_ID}"
      - stopApp:
          appId: "com.apple.mobilesafari"
      - launchApp:
          appId: "com.apple.mobilesafari"
      - waitForAnimationToEnd:
          timeout: 5000
      - tapOn:
          id: "TabBarItemTitle"
      - inputText: "https://example.com"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: "Example Domain"
          timeout: 30000
      - tapOn:
          text: "Continue"
          optional: true
      # Share the page URL via the address bar context menu. Page-level
      # More→Share shows Mattermost but does not open the share extension
      # on iOS 26 (same failure mode as share_text).
      - tapOn:
          id: "TabBarItemTitle"
      - longPressOn:
          id: "TabBarItemTitle"
      - tapOn:
          text: "Share..."
      # CI .app label is "Mattermost"; local builds may show "Mattermost Beta".
      - extendedWaitUntil:
          visible:
            text: "Mattermost"
          timeout: 30000
      - runFlow:
          when:
            visible:
              text: "Mattermost Beta"
          commands:
            - tapOn:
                text: "Mattermost Beta"
      - runFlow:
          when:
            notVisible:
              text: "Mattermost Beta"
          commands:
            - tapOn:
                text: "Mattermost"
      - extendedWaitUntil:
          visible:
            id: "share_extension.channel.option"
          timeout: 40000

# --- Android: use Chrome ---
- runFlow:
    when:
      platform: Android
    commands:
      - runFlow:
          file: ../../utils/open_url_in_chrome_android.yml
          env:
            CHROME_URL: "https://example.com"
      - extendedWaitUntil:
          visible:
            text: "Example Domain"
          timeout: 30000
      # Open Chrome overflow menu and tap Share
      - tapOn:
          id: "com.android.chrome:id/menu_button"
      - extendedWaitUntil:
          visible:
            id: "com.android.chrome:id/share_menu_id"
          timeout: 5000
      - tapOn:
          id: "com.android.chrome:id/share_menu_id"
      # On older Android the share sheet shows a truncated list and requires
      # tapping "More" to see all targets. On API 34+ all targets are shown
      # directly. Try "More" first, and if it's absent tap Mattermost Beta
      # directly instead.
      - runFlow:
          when:
            visible:
              text: "More"
          commands:
            - tapOn:
                text: "More"
      - extendedWaitUntil:
          visible:
            text: "Mattermost"
          timeout: 10000
      - runFlow:
          when:
            visible:
              text: "Mattermost Beta"
          commands:
            - tapOn:
                text: "Mattermost Beta"
      - runFlow:
          when:
            notVisible:
              text: "Mattermost Beta"
          commands:
            - tapOn:
                text: "Mattermost"

# Share extension opens: tap Channel option to open channel picker
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 15000
- tapOn:
    id: "share_extension.channel.option"

# Select the test channel from the channel list
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"

# Post the shared content
- tapOn:
    id: "share_extension.post.button"

# Return to Mattermost and verify the link post appeared in the channel
- launchApp:
    appId: "${MAESTRO_APP_ID}"
- extendedWaitUntil:
    visible:
      id: "channel.post_list.post"
    timeout: 15000
- assertVisible:
    id: "channel.post_list.post"
