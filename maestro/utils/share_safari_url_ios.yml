# Sub-flow: open the iOS Safari share sheet for the current page URL.
# iOS 26: toolbar ⋯ (Page Menu) → Share → system share sheet.
# Page-level Share... on selected text is handled by share_safari_text_ios.yml.
appId: com.apple.mobilesafari
---
- retry:
    label: Open Safari page-menu share sheet
    maxRetries: 3
    commands:
      - waitForAnimationToEnd:
          timeout: 3000
      - runFlow:
          when:
            notVisible:
              text: "Share"
          commands:
            - tapOn:
                text: "More"
                rightOf:
                  id: "TabBarItemTitle"
                retryTapIfNoChange: true
                optional: true
      - runFlow:
          when:
            notVisible:
              text: "Share"
          commands:
            # Bottom-toolbar ⋯ page menu — no stable testID on iOS 26 Safari.
            - tapOn:
                point: "86%, 93%"
      - extendedWaitUntil:
          visible:
            text: "Share"
          timeout: 8000
      - tapOn:
          text: "Share"
      - extendedWaitUntil:
          visible:
            text: "Copy"
          timeout: 15000
