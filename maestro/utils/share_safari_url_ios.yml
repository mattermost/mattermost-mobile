# Sub-flow: share the current Safari page URL via the address-bar context menu.
# Page-level More→Share shows Mattermost but does not open the share extension on iOS 26.
appId: com.apple.mobilesafari
---
- retry:
    label: Open Safari address-bar share menu
    maxRetries: 2
    commands:
      - runFlow:
          when:
            visible:
              id: "TabBarItemTitle"
          commands:
            - longPressOn:
                id: "TabBarItemTitle"
      - runFlow:
          when:
            notVisible:
              id: "TabBarItemTitle"
          commands:
            # System overlay — address bar on iOS 26 CI simulators.
            - longPressOn:
                point: "50%, 9%"
      - extendedWaitUntil:
          visible:
            text: "Share..."
          timeout: 5000
- tapOn:
    text: "Share..."
