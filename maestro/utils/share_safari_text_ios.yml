# Sub-flow: share selected text from Safari via the selection context menu (iOS 26).
appId: com.apple.mobilesafari
---
- retry:
    label: Select text and reveal Share action
    maxRetries: 3
    commands:
      - longPressOn:
          text: "Example Domain"
      - runFlow:
          when:
            notVisible:
              text: "Share..."
          commands:
            - tapOn:
                text: ">"
                optional: true
            - tapOn:
                text: "More"
                optional: true
            - runFlow:
                when:
                  notVisible:
                    text: "Share..."
                commands:
                  - swipe:
                      start: "85%, 26%"
                      end: "35%, 26%"
            - runFlow:
                when:
                  notVisible:
                    text: "Share..."
                commands:
                  # Compact selection bar chevron — system UI, no testID.
                  - tapOn:
                      point: "94%, 52%"
                  - waitForAnimationToEnd:
                      timeout: 2000
      - extendedWaitUntil:
          visible:
            text: "Share..."
          timeout: 5000
- tapOn:
    text: "Share..."
- takeScreenshot: after-tap-share
