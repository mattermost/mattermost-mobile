# Submit shared content via ShareActivity (after adb SEND intent in CI).
appId: ${MAESTRO_APP_ID}
---
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 20000
- tapOn:
    id: "share_extension.channel.option"
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"
- tapOn:
    id: "share_extension.post.button"
- waitForAnimationToEnd:
    timeout: 5000
