# Sub-flow: register Mattermost in Android direct-share before opening Chrome.
# Foreground the app briefly so Chrome share sheets list Mattermost on API 34/35.
# Does not require the home tab — login may leave the app on any screen.
appId: ${MAESTRO_APP_ID}
---
- launchApp:
    stopApp: false
    clearState: false
- waitForAnimationToEnd:
    timeout: 5000
- pressKey: Home
