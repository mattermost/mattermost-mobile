# Sub-flow: pick Mattermost from the iOS system share sheet and wait for the extension.
# After tapping Mattermost, the share extension UI owns share_extension.* testIDs.
appId: ${MAESTRO_APP_ID}
---
- extendedWaitUntil:
    visible:
      text: "Mattermost"
    timeout: 30000
- runFlow:
    when:
      visible:
        text: "Mattermost Beta"
    commands:
      - tapOn:
          text: "Mattermost Beta"
- runFlow:
    when:
      notVisible:
        text: "Mattermost Beta"
    commands:
      - tapOn:
          text: "Mattermost"
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 40000
