# Dismiss Chrome first-run / ads interstitials on a fresh API 35 emulator.
# Usage: - runFlow: ../utils/dismiss_chrome_interstitial.yml
appId: ${MAESTRO_APP_ID}
---
- tapOn:
    text: "Use without an account"
    optional: true
- tapOn:
    text: "No thanks"
    optional: true
- tapOn:
    text: "Accept & continue"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- tapOn:
    text: "Use Chrome without an account"
    optional: true
