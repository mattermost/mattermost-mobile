# Sub-flow: open a URL in Chrome on Android (share / browser hand-off flows).
# Usage: - runFlow: ../utils/open_url_in_chrome_android.yml
# Requires env: CHROME_URL (e.g. https://example.com)
appId: ${MAESTRO_APP_ID}
---
- stopApp:
    appId: "com.android.chrome"
- launchApp:
    appId: "com.android.chrome"
- runFlow: dismiss_chrome_interstitial.yml
- tapOn:
    id: "com.android.chrome:id/search_box_text"
    optional: true
- tapOn:
    id: "com.android.chrome:id/url_bar"
    optional: true
- inputText: ${CHROME_URL}
- pressKey: Enter
- runFlow: dismiss_chrome_interstitial.yml
