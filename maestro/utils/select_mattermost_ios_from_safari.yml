# Pick Mattermost from the iOS Safari share sheet (share link/text flows).
# Must stay on com.apple.mobilesafari while the system sheet is visible.
#
# iOS 26 Safari quirk: the share sheet (ActivityListView) renders as a bottom
# sheet, but the share-target cells' accessibility bounds are reported in a
# transformed coordinate space near the top of the screen. Text/id taps resolve
# to those bogus bounds and land on the page-menu dismiss region, closing the
# sheet. Screen-relative point taps hit the real cells at the bottom (~76% y).
# The Apps list that opens after "More" is a normal full-screen modal whose
# bounds ARE in screen space, so text taps work there.
appId: com.apple.mobilesafari
---
- waitForAnimationToEnd:
    timeout: 3000

# App row: ... | More (last cell) at screen y ~76%. Tap More → full Apps list.
- takeScreenshot: ios-safari-share-sheet
- tapOn:
    point: "83%, 76%"
    retryTapIfNoChange: false
- extendedWaitUntil:
    visible:
      text: "Suggestions"
    timeout: 10000
- takeScreenshot: ios-safari-share-apps

# Apps list is screen-space — tap Mattermost by text.
- tapOn:
    text: "Mattermost"
- runFlow:
    when:
      notVisible:
        id: "share_extension.channel.option"
    commands:
      # Scroll if Mattermost is below the fold in the Apps list.
      - scrollUntilVisible:
          element:
            text: "Mattermost"
          direction: DOWN
          timeout: 10000
          optional: true
      - tapOn:
          text: "Mattermost"

- runFlow: wait_for_share_extension.yml
