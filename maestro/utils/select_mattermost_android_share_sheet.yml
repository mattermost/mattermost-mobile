# Select Mattermost in the Android system share sheet.
# Stay on com.android.chrome while the system share sheet is visible.
# CI APK label is "Mattermost Beta" (android/app/src/main/res/values/strings.xml).
# Usage: - runFlow: ../../utils/select_mattermost_android_share_sheet.yml
appId: com.android.chrome
---
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: android-share-sheet-open
- tapOn:
    text: "See all"
    optional: true
- tapOn:
    text: "See all apps"
    optional: true
- tapOn:
    text: "More"
    optional: true
- tapOn:
    text: "All apps"
    optional: true
- tapOn:
    text: "Apps"
    optional: true
- swipe:
    start: "50%, 85%"
    end: "50%, 45%"
    optional: true
- swipe:
    start: "50%, 85%"
    end: "50%, 45%"
    optional: true
- scrollUntilVisible:
    element:
      text: "Mattermost Beta"
    direction: DOWN
    timeout: 30000
- tapOn:
    text: "Mattermost Beta"
- runFlow: wait_for_share_extension.yml
