# Sub-flow: open a URL in Mobile Safari (iOS CI simulators).
#
# Maestro cross-app pattern (GUIDELINES §3):
#   1. launchApp host (Safari)
#   2. openLink (device-level URL open)
#   3. extendedWaitUntil on a stable page anchor before interacting
#
# Usage:
#   - runFlow:
#       file: ../utils/open_url_in_safari_ios.yml
#       env:
#         SAFARI_URL: "https://example.com"
#         SAFARI_PAGE_TITLE: "Example Domain"
appId: com.apple.mobilesafari
---
- stopApp:
    appId: "com.apple.mobilesafari"
- launchApp:
    appId: "com.apple.mobilesafari"
- openLink:
    link: ${SAFARI_URL}
# iOS may show a one-time "Open" confirmation for external links (Maestro openLink docs).
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- tapOn:
    text: "Continue"
    optional: true
- extendedWaitUntil:
    visible:
      text: ${SAFARI_PAGE_TITLE}
    timeout: 30000
# Manual URL entry when openLink did not render the expected page.
- runFlow:
    when:
      notVisible:
        text: ${SAFARI_PAGE_TITLE}
    commands:
      - runFlow:
          when:
            visible:
              id: "TabBarItemTitle"
          commands:
            - tapOn:
                id: "TabBarItemTitle"
            - eraseText: 80
            - inputText: ${SAFARI_URL}
            - pressKey: Enter
      - runFlow:
          when:
            notVisible:
              id: "TabBarItemTitle"
          commands:
            # System overlay — no stable testID on iOS 26 Safari address bar.
            - tapOn:
                point: "50%, 9%"
            - eraseText: 80
            - inputText: ${SAFARI_URL}
            - pressKey: Enter
      - tapOn:
          text: "Continue"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ${SAFARI_PAGE_TITLE}
          timeout: 30000
