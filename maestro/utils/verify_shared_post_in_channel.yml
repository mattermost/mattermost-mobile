# Verify a shared post is visible in the test channel (UI only — API poll runs in run_ci_batches.sh).
# Requires: TEST_CHANNEL_NAME; optional SHARE_VERIFY_TEXT for link preview title.
appId: ${MAESTRO_APP_ID}
env:
  SHARE_VERIFY_TEXT: ${SHARE_VERIFY_TEXT || SYNC_TOKEN}
---
- launchApp:
    appId: "${MAESTRO_APP_ID}"
    stopApp: false
- runFlow: navigate_to_channel.yml
- tapOn:
    id: "scroll-to-end-view"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- scrollUntilVisible:
    element:
      id: "channel.post_list.post"
    direction: UP
    timeout: 60000
- assertVisible:
    id: "channel.post_list.post"
- extendedWaitUntil:
    visible:
      text: "${SHARE_VERIFY_TEXT}"
    timeout: 15000
    optional: true
- takeScreenshot: share-post-verified
