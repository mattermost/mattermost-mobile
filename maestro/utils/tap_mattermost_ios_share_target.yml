# Tap the Mattermost share-extension target in an open iOS share sheet.
# Inherits appId from the host-app wrapper (Safari or Photos).
#
# iOS 26.3: use More → Apps list → Mattermost (direct app-row taps hit wrong targets).
appId: ${SHARE_HOST_APP_ID}
---
- waitForAnimationToEnd:
    timeout: 3000

# Safari link / Photos image share sheets — horizontal app row ends with More.
- runFlow:
    when:
      visible:
        text: "More"
      notVisible:
        id: "share_extension.channel.option"
    commands:
      - takeScreenshot: ios-share-sheet-open
      - retry:
          label: Tap share-sheet app-row More (not Safari toolbar More)
          maxRetries: 3
          commands:
            - runFlow:
                when:
                  notVisible:
                    text: "Suggestions"
                commands:
                  - tapOn:
                      text: "More"
                      above: "Copy"
                      retryTapIfNoChange: true
            - runFlow:
                when:
                  notVisible:
                    text: "Suggestions"
                commands:
                  - tapOn:
                      text: "More"
                      rightOf: "Mattermost"
                      retryTapIfNoChange: true
                      optional: true
            - runFlow:
                when:
                  notVisible:
                    text: "Suggestions"
                commands:
                  - tapOn:
                      point: "88%, 58%"
            - extendedWaitUntil:
                visible:
                  text: "Suggestions"
                timeout: 10000
      - takeScreenshot: ios-share-apps-list
      - tapOn:
          text: "Mattermost"
          below: "Suggestions"
          retryTapIfNoChange: true
      - runFlow:
          when:
            notVisible:
              id: "share_extension.channel.option"
            notVisible:
              text: "Share to Mattermost"
          commands:
            - tapOn:
                text: "Mattermost Beta"
                retryTapIfNoChange: true
      - extendedWaitUntil:
          visible:
            text: "Share to Mattermost"
          timeout: 15000
          optional: true
      - runFlow: wait_for_share_extension.yml

# Fallback: compact share sheet without More (older Safari layouts).
- runFlow:
    when:
      notVisible:
        text: "More"
      notVisible:
        id: "share_extension.channel.option"
    commands:
      - extendedWaitUntil:
          visible:
            text: "Reminders"
          timeout: 30000
          optional: true
      - runFlow:
          when:
            visible:
              text: "Reminders"
          commands:
            - tapOn:
                text: "Mattermost"
                rightOf: "Reminders"
                retryTapIfNoChange: true
      - runFlow:
          when:
            notVisible:
              text: "Reminders"
          commands:
            - scrollUntilVisible:
                element:
                  text: "Mattermost"
                direction: RIGHT
                timeout: 20000
                optional: true
            - tapOn:
                text: "Mattermost"
                retryTapIfNoChange: true
      - runFlow: wait_for_share_extension.yml
