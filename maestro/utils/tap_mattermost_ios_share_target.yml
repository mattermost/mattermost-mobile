# Tap the Mattermost share-extension target in an open iOS share sheet.
# Inherits appId from the host-app wrapper (Safari or Photos).
#
# MattermostShare.appex display name is "Mattermost" (ios/MattermostShare/Info.plist),
# not "Mattermost Beta" (main app CFBundleDisplayName).
#
# Photos also shows a "◀ Mattermost" navbar back affordance — never wait on bare
# text "Mattermost" alone; anchor the share sheet first, then use relational
# selectors (Maestro relational selectors docs).
appId: ${SHARE_HOST_APP_ID}
---
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: ios-share-sheet-open
# Confirm the share sheet is open before targeting the app row.
- extendedWaitUntil:
    visible:
      text: "Copy Photo"
    timeout: 30000
    optional: true
- extendedWaitUntil:
    visible:
      text: "Reminders"
    timeout: 30000
    optional: true
- swipe:
    from: "88%, 82%"
    to: "12%, 82%"
    optional: true
# Photos layout: Reminders | Mattermost | Preview | More (CI artifact share-sheet-open.png)
- runFlow:
    when:
      visible:
        text: "Reminders"
    commands:
      - tapOn:
          text: "Mattermost"
          rightOf: "Reminders"
          retryTapIfNoChange: true
# Safari / compact sheets without Reminders — tap the app-row label.
- runFlow:
    when:
      notVisible:
        text: "Reminders"
    commands:
      - scrollUntilVisible:
          element:
            text: "Mattermost"
          direction: RIGHT
          timeout: 20000
          optional: true
      - tapOn:
          text: "Mattermost"
          retryTapIfNoChange: true
- runFlow: wait_for_share_extension.yml
